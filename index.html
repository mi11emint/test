<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響ヒーリングゲーム：世界樹の開花 (枝振り強化版)</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #1a1a2e;
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(180, 200, 255, 0.05);
            border-radius: 8px;
        }
        #startBtn {
            padding: 14px 28px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 190, 231, 0.7);
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや静かな音楽で、世界樹に宝石の花を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let timeLeft = 30;
        let timerInterval;
        
        // 開花コントロール
        let bloomProgress = 0; // 0.0 〜 1.0 (1.0で20秒時点の満開)
        let maxBloomProgress = 1.5; 
        let flowers = [];
        
        // 世界樹の骨組み
        let treeBranches = [];

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                flowers = [];
                startBtn.style.display = 'none';

                // 世界樹の枝の生成（開始時の幹の長さや深さを調整）
                treeBranches = [];
                generateTree(canvas.width / 2, canvas.height - 40, -Math.PI / 2, 85, 9);

                // タイマー
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        // ⭐【修正】添付画像のような全体的に丸い、横にも広がる枝振りを生成するアルゴリズム
        function generateTree(x, y, angle, length, depth) {
            if (depth === 0) return;

            // 添付画像のように、幹に近い方が太く、先に行くほど細くなるように、各段階で長さを調整
            // depthが深い（幹に近い）ときは長く、浅いときは短く
            let adjustedLength = length * (0.6 + depth * 0.1); 

            let x2 = x + Math.cos(angle) * adjustedLength;
            let y2 = y + Math.sin(angle) * adjustedLength;

            treeBranches.push({ x1: x, y1: y, x2: x2, y2: y2, depth: depth });

            // 枝の密度を上げるため、花の候補地も少し増やす
            if (depth <= 7) { 
                let flowerCount = Math.floor((8 - depth) * 2.5); // 密度アップ
                for(let i=0; i<flowerCount; i++) {
                    let t = Math.random(); 
                    let fx = x + (x2 - x) * t;
                    let fy = y + (y2 - y) * t;
                    
                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    flowers.push({
                        x: fx,
                        y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        size: Math.random() * 4 + 4, // サイズを少し小さめにして密度感
                        requiredProgress: Math.random() * 1.0, 
                        sparkleOffset: Math.random() * 100
                    });
                }
            }

            // ⭐ 分岐角度と長さを調整して、全体的に大きな「丸い形」になるように
            let numBranches = 2; // 基本は2本に分岐

            for (let i = 0; i < numBranches; i++) {
                // 角度を広く取ることで、横への広がりを表現
                // 特に幹に近いところでは広い角度で分岐
                let angleSpread = (depth > 6) ? 0.9 : 0.6; // 角度の広がり
                let angleShift = (i === 0) ? -angleSpread : angleSpread;
                let newAngle = angle + angleShift * (Math.random() * 0.5 + 0.5);

                // 先に行くほど枝が短くなるように縮小率を調整
                let shrinkFactor = (depth > 6) ? 0.8 : 0.75;
                let newLength = length * shrinkFactor * (0.8 + Math.random() * 0.4);

                generateTree(x2, y2, newAngle, newLength, depth - 1);
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let totalVolume = 0;
            for (let i = 0; i < dataArray.length; i++) {
                totalVolume += dataArray[i];
            }
            let avgVolume = totalVolume / dataArray.length;

            if (avgVolume > 15) {
                bloomProgress += 0.001; // 少しだけ咲くペースを早く調整
                if (bloomProgress > maxBloomProgress) bloomProgress = maxBloomProgress;
            }
        }

        function drawGame() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ⭐ 世界樹の幹と枝を描画（シックなグレー。幹をより太く）
            treeBranches.forEach(b => {
                ctx.save();
                ctx.strokeStyle = `rgba(120, 128, 140, ${0.2 + (b.depth * 0.08)})`;
                // 添付画像の太い幹を表現するため、depthによる太さの倍率をアップ
                ctx.lineWidth = b.depth * (b.depth > 7 ? 1.5 : 1.1); 
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(b.x1, b.y1);
                ctx.lineTo(b.x2, b.y2);
                ctx.stroke();
                ctx.restore();
            });

            // 花の描画
            let now = Date.now();
            flowers.forEach(f => {
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = f.color;
                    
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    let currentSize = f.size * Math.min(1.5, (bloomProgress - f.requiredProgress) * 4 + 0.5);
                    ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            // UIテキスト
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '15px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            // インジケーター
            ctx.fillStyle = 'rgba(144, 164, 174, 0.15)';
            ctx.textAlign = 'center';
            if (bloomProgress < maxBloomProgress && !isGameOver) {
                ctx.fillText(".. 穏やかな声を感知中 ..", canvas.width/2, canvas.height - 15);
            }

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffb7d5';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffb7d5';
                ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度世界樹を育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
