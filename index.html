<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声リズムゲーム（タイミング特化＆超発光花火版）</title>
    <style>
        body {
            margin: 0;
            background-color: #03030a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #223;
            background-color: #010105;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 25px rgba(0,255,255,0.08);
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 15px #00ffff;
        }
        #info {
            font-size: 14px;
            color: #778;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">【作戦変更】音程なし！声や楽器のタイミングだけで下枠を狙え！5コンボで超発光花火🎆</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let timerInterval;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        // ⭐ 上の判定を無くし、中央（上）から下へ流れるレーン1本に変更
        const spawnY = 80;
        const judgeLowY = canvas.height - 70;
        const targetRadius = 32;

        let notes = [];
        let nextSpawnCountdown = 0;
        let hitEffects = [];
        let fireworks = [];

        let lastVolume = 0;
        let inputCooldown = 0;

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                combo = 0;
                timeLeft = 30;
                notes = [];
                hitEffects = [];
                fireworks = [];
                nextSpawnCountdown = 20;
                startBtn.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            updateGame();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            // ⭐ 音程の区別を無くしたため、純粋に全体の音量をチェック
            let maxVal = 0;
            for (let i = 0; i < dataArray.length; i++) {
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                }
            }

            let currentVolume = maxVal;
            const threshold = 30; // 声や楽器がサクッと反応しやすい音量基準

            if (inputCooldown > 0) inputCooldown--;

            let volumeSpike = currentVolume - lastVolume;

            // 声や楽器が「発音された瞬間（立ち上がり）」だけを正確にキャッチ
            if (currentVolume > threshold && volumeSpike > 10 && inputCooldown === 0) {
                checkJudgment(); // タイミング判定へ直接ジャンプ！
                inputCooldown = 10; 
            }

            lastVolume = currentVolume; 
        }

        function updateGame() {
            nextSpawnCountdown--;
            if (nextSpawnCountdown <= 0) {
                // すべて下の判定枠に向かうノーツを生成
                notes.push({
                    progress: 0, 
                    speed: 0.014 + Math.random() * 0.006
                });
                nextSpawnCountdown = Math.floor(Math.random() * 30) + 25;
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].progress += notes[i].speed;
                if (notes[i].progress > 1.15) {
                    notes.splice(i, 1);
                    combo = 0; // 見逃したらコンボリセット
                }
            }

            for (let i = hitEffects.length - 1; i >= 0; i--) {
                hitEffects[i].alpha -= 0.06;
                hitEffects[i].radius += 2.5;
                if (hitEffects[i].alpha <= 0) hitEffects.splice(i, 1);
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                let fw = fireworks[i];
                fw.delay--;
                if (fw.delay <= 0) {
                    fw.state = "explode";
                    fw.alpha -= 0.018; // 少しゆっくり消えるようにして輝きを堪能
                    fw.radius += fw.expandSpeed; 
                    fw.expandSpeed *= 0.95; 
                }
                if (fw.alpha <= 0) fireworks.splice(i, 1);
            }
        }

        function checkJudgment() {
            let targetIndex = -1;
            let maxProgress = -1;

            for(let i=0; i<notes.length; i++) {
                if(notes[i].progress > maxProgress) {
                    maxProgress = notes[i].progress;
                    targetIndex = i;
                }
            }

            if (targetIndex === -1) return; 
            
            let note = notes[targetIndex];
            let diff = Math.abs(note.progress - 1.0);
            let currentY = spawnY + (judgeLowY - spawnY) * note.progress;

            let hitSuccess = false;

            if (diff < 0.10) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#ffffff", blur: 40, alpha: 1.0
                });
                score += 150;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            } else if (diff < 0.22) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#b0e0ff", blur: 18, alpha: 0.75
                });
                score += 50;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            }

            // ⭐【修正】5回コンボで花火が上がるように変更！
            if (hitSuccess && combo >= 5) {
                triggerFireworkShow(); 
                combo = 0; 
            }
        }

        function triggerFireworkShow() {
            const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7"];
            for (let i = 0; i < 5; i++) {
                let fireworkX = (Math.random() > 0.5) ? (Math.random() * 90 + 30) : (Math.random() * 90 + 280);
                let fireworkY = Math.random() * 200 + 130; // 判定枠を避けた中段エリア

                fireworks.push({
                    x: fireworkX,
                    y: fireworkY,
                    radius: 3,
                    maxRadius: Math.random() * 20 + 35,
                    expandSpeed: 2.0 + Math.random() * 1.0,
                    color: pastelColors[i % pastelColors.length],
                    alpha: 1.0, 
                    delay: i * 8, 
                    state: "wait"
                });
            }
            score += 1000; 
        }

        function drawGame() {
            ctx.fillStyle = '#020206';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ⭐【修正】圧倒的な光の広がりを表現する「超発光」重ね描きシステム
            fireworks.forEach(fw => {
                if (fw.state === "explode") {
                    ctx.save();
                    ctx.globalAlpha = fw.alpha;
                    
                    // 1層目：大きく包み込む淡い巨大な光のオーラ
                    ctx.shadowBlur = fw.radius * 2.2; 
                    ctx.shadowColor = fw.color;
                    ctx.strokeStyle = fw.color;
                    ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius, 0, Math.PI * 2); ctx.stroke();
                    
                    // 2層目：中心に近い部分のクッキリした強い光の輪
                    ctx.shadowBlur = 15;
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = "#ffffff"; // 芯を白く輝かせる
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius, 0, Math.PI * 2); ctx.stroke();
                    
                    // 3層目：中央のまばゆいコア
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.12, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.restore();
                }
            });

            // 単一レーン線（上から下へ）
            ctx.strokeStyle = '#101025';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, spawnY); ctx.lineTo(centerX, judgeLowY);
            ctx.stroke();

            // 🎯 下の判定リングのみ（サイバーブルー）
            ctx.strokeStyle = 'rgba(0, 150, 255, 0.45)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(centerX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();

            // 発光残像
            hitEffects.forEach(fx => {
                ctx.save();
                ctx.globalAlpha = fx.alpha;
                ctx.shadowBlur = fx.blur;
                ctx.shadowColor = fx.color;
                ctx.fillStyle = fx.color;
                ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // 🎵 上から降ってくる白い光ノーツ
            notes.forEach(note => {
                let currentY = spawnY + (judgeLowY - spawnY) * note.progress;
                let currentRadius = 3 + (15 * note.progress);

                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#0099ff";
                
                let gradient = ctx.createRadialGradient(centerX, currentY, 1, centerX, currentY, currentRadius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.6, '#f5f8ff');
                gradient.addColorStop(1, "#0088ff");
                ctx.fillStyle = gradient;

                ctx.beginPath(); ctx.arc(centerX, currentY, currentRadius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // ⭐【修正】5回コンボ満タン仕様の白いサークルゲージ（中央やや上めに配置して視認性UP）
            let gaugeY = centerY - 20;
            ctx.save();
            ctx.strokeStyle = "#151525";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(centerX, gaugeY, 22, 0, Math.PI * 2);
            ctx.stroke();

            if (combo > 0) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ffffff"; 
                ctx.strokeStyle = "#ffffff"; 
                ctx.lineWidth = 6;
                // 5回で1周する計算
                let progressAngle = (combo / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(centerX, gaugeY, 22, -Math.PI / 2, (-Math.PI / 2) + progressAngle);
                ctx.stroke();
            }
            ctx.restore();

            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left'; ctx.fillText(`SCORE: ${score}`, 20, 40);
            ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 40);

            // 🛑 リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(1, 1, 5, 0.93)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('タイムアップ！', centerX, centerY - 30);
                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, centerX, centerY + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度遊ぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
