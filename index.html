<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>動画合成アプリ</title>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>

<style>

body{
background:#f5f7fa;
font-family:sans-serif;
max-width:500px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.box{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:16px;
margin-top:10px;
}

.preview{
width:100%;
aspect-ratio:16/9;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
border-radius:15px;
}

.preview canvas,
.preview video{
width:100%;
height:100%;
object-fit:contain;
}

input[type=file]{
width:100%;
margin-top:10px;
}

input[type=text]{
width:100%;
padding:10px;
font-size:16px;
box-sizing:border-box;
}

#status{
margin-top:15px;
text-align:center;
color:#4f46e5;
font-weight:bold;
}

</style>

</head>

<body>

<h1>動画合成アプリ</h1>

<div class="box">

<h3>①画像を選ぶ</h3>

<input
type="file"
id="imageInput"
accept="image/*">

<br><br>

<input
type="text"
id="textInput"
placeholder="文字を入力">

</div>

<div class="box">

<h3>②音声を選ぶ</h3>

<input
type="file"
id="audioInput"
accept="audio/*">

<button id="recordBtn">

🎤録音開始

</button>

</div>

<div class="box">

<h3>③確認</h3>

<div
class="preview"
id="preview">

画像を選択してください

</div>

<div id="status"></div>

<button id="createBtn">

🎬動画作成

</button>

</div>

<script>

const imageInput=
document.getElementById(
"imageInput"
);

const textInput=
document.getElementById(
"textInput"
);

const audioInput=
document.getElementById(
"audioInput"
);

const preview=
document.getElementById(
"preview"
);

const status=
document.getElementById(
"status"
);

const recordBtn=
document.getElementById(
"recordBtn"
);

const createBtn=
document.getElementById(
"createBtn"
);

let imageFile=null;

let audioFile=null;

let mediaRecorder=null;

let chunks=[];

const canvas=
document.createElement(
"canvas"
);

const ctx=
canvas.getContext(
"2d"
);

canvas.width=1280;

canvas.height=720;

function drawCanvas(img){

ctx.clearRect(
0,
0,
1280,
720
);

ctx.drawImage(
img,
0,
0,
1280,
720
);

if(textInput.value!=""){

ctx.fillStyle=
"rgba(0,0,0,0.5)";

ctx.fillRect(
0,
600,
1280,
120
);

ctx.fillStyle=
"white";

ctx.font=
"bold 50px sans-serif";

ctx.textAlign=
"center";

ctx.fillText(
textInput.value,
640,
670
);

}

}

imageInput.addEventListener(
"change",
()=>{

imageFile=
imageInput.files[0];

if(!imageFile)return;

const img=
new Image();

img.src=
URL.createObjectURL(
imageFile
);

img.onload=()=>{

drawCanvas(
img
);

preview.innerHTML="";

preview.appendChild(
canvas
);

};

}
);

textInput.addEventListener(
"input",
()=>{

if(!imageFile)return;

const img=
new Image();

img.src=
URL.createObjectURL(
imageFile
);

img.onload=()=>{

drawCanvas(
img
);

};

}
);

audioInput.addEventListener(
"change",
()=>{

audioFile=
audioInput.files[0];

}
);

recordBtn.addEventListener(
"click",
async()=>{

if(
!mediaRecorder||
mediaRecorder.state==="inactive"
){

const stream=
await navigator.mediaDevices.getUserMedia(
{
audio:true
}
);

chunks=[];

mediaRecorder=
new MediaRecorder(
stream
);

mediaRecorder.ondataavailable=e=>{

chunks.push(
e.data
);

};

mediaRecorder.onstop=()=>{

audioFile=
new Blob(
chunks,
{
type:"audio/webm"
}
);

};

mediaRecorder.start();

recordBtn.innerHTML=
"■録音停止";

}else{

mediaRecorder.stop();

recordBtn.innerHTML=
"🎤録音開始";

}
});
const {
FFmpeg
}=FFmpegWASM;

const ffmpeg=
new FFmpeg();

createBtn.addEventListener(
"click",
async()=>{

try{

if(!imageFile){

alert(
"画像を選択してください"
);

return;

}

if(!audioFile){

alert(
"音声を選択してください"
);

return;

}

createBtn.disabled=true;

status.innerHTML=
"FFmpeg読込中...";

await ffmpeg.load({
coreURL:
"https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js"
});

status.innerHTML=
"画像準備中...";

const imageBlob=
await new Promise(
resolve=>
canvas.toBlob(
resolve,
"image/png"
)
);

await ffmpeg.writeFile(
"image.png",
new Uint8Array(
await imageBlob.arrayBuffer()
)
);

status.innerHTML=
"音声準備中...";

await ffmpeg.writeFile(
"audio.webm",
new Uint8Array(
await audioFile.arrayBuffer()
)
);

status.innerHTML=
"動画生成中...";

await ffmpeg.exec([

"-loop","1",

"-i","image.png",

"-i","audio.webm",

"-c:v","libx264",

"-tune","stillimage",

"-pix_fmt","yuv420p",

"-shortest",

"output.mp4"

]);

status.innerHTML=
"完成";

const data=
await ffmpeg.readFile(
"output.mp4"
);

const blob=
new Blob(
[data.buffer],
{
type:
"video/mp4"
}
);

const url=
URL.createObjectURL(
blob
);

preview.innerHTML=
`<video
controls
src="${url}"> </video>`;

const a=
document.createElement(
"a"
);

a.href=url;

a.download=
"movie.mp4";

a.click();

}
catch(error){

console.error(
error
);

status.innerHTML=
"エラー";

alert(
error.message
);

}
finally{

createBtn.disabled=false;

}

});

</script>

</body>

</html>
