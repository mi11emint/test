<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>にふなみ - 動画保存中ミニゲーム選択</title>
    <style>
        /* --- 🌐 全体共通スタイル --- */
        body {
            margin: 0;
            background-color: #03030a;
            color: #fff;
            /* 🔤 ご指定のフォントファミリー順に設定しました */
            font-family: 'Cinecaption', 'Courier New', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* 📱 画面全体の無駄なズームやスクロールを徹底禁止 */
        }

        .universal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
        }

        #info {
            font-size: 15px;
            color: #e0ffff;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
            line-height: 1.6;
            letter-spacing: 0.05em;
        }

        /* --- 📱 にふなみ動画背景選択風：スマートメニュー --- */
        #menuContainer {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 280px;
            margin-top: 10px;
        }
        
        /* 選択肢全体のタップエリア（触れたら即反応） */
        .menu-row {
            display: flex;
            align-items: center;
            justify-content: center; /* 中央寄せにしてスッキリ配置 */
            font-size: 18px;
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 14px 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            transition: background 0.15s, border-color 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 指が触れた瞬間のフィードバック効果（にふなみテイスト） */
        .menu-row:active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        /* 文字の色（デフォルト） */
        .menu-text {
            color: #fff;
            transition: color 0.15s, text-shadow 0.15s;
        }

        /* 触れた瞬間に各テーマカラーがほんのり発光 */
        .menu-row[data-game="invader"]:active .menu-text { color: #0fa; text-shadow: 0 0 8px rgba(0,255,170,0.4); }
        .menu-row[data-game="catch"]:active .menu-text { color: #00d2ff; text-shadow: 0 0 8px rgba(0,210,255,0.4); }
        .menu-row[data-game="tree"]:active .menu-text { color: #e1bee7; text-shadow: 0 0 8px rgba(225,190,231,0.4); }

        /* --- 🖼️ キャンバス表示制御 --- */
        #gameCanvas {
            background-color: #000;
            max-width: 100%;
            max-height: 60vh;
            display: none;
        }
        .border-invader { border: 2px solid #555; }
        .border-catch { border: 2px solid #223; box-shadow: 0 0 25px rgba(0,255,255,0.08); }

        /* --- 🕹️ ゲームプレイ時操作ボタンエリア --- */
        .controls-area {
            display: none;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .btn-move {
            width: 45%;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-move:active {
            background-color: #555;
        }
        .btn-catch-style {
            background: linear-gradient(135deg, #0f2042 0%, #061026 100%);
            border: 2px solid #00d2ff;
            color: #00d2ff;
            height: 55px;
            font-size: 18px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,210,255,0.3);
        }
        .btn-catch-style:active {
            background: #00d2ff;
            color: #03030a;
            box-shadow: 0 0 20px rgba(0,210,255,0.6);
        }

        /* --- 🌳 世界樹ゲーム用特殊コンテナ --- */
        .tree-game-container {
            display: none;
            position: relative;
            width: 450px;
            height: 450px;
            max-width: 90vw;
            max-height: 60vh;
            background-color: #020205;
            border-radius: 8px;
            overflow: hidden;
        }
        #treeImg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.6; 
            z-index: 1;
        }
        #treeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="universal-container">
        <div id="info">・・・保存待ち時間中・・・<br>ミニゲームを選んでね！</div>
        
        <div id="menuContainer">
            <div class="menu-row" data-game="invader">
                <span class="menu-text">Sound Invader</span>
            </div>
            <div class="menu-row" data-game="catch">
                <span class="menu-text">Aqua Catch</span>
            </div>
            <div class="menu-row" data-game="tree">
                <span class="menu-text">Yggdrasil</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div class="tree-game-container" id="treeContainer">
            <img id="treeImg" src="https://img1.mitemin.net/cn/c9/5h3rb7a49bj373z8gxyk7s3t40_k6d_vu_yx_5kna.png" alt="世界樹">
            <canvas id="treeCanvas" width="450" height="450"></canvas>
        </div>
        
        <div class="controls-area" id="controlsBlock">
            <button id="leftBtn" class="btn-move">◀</button>
            <button id="rightBtn" class="btn-move">▶</button>
        </div>
    </div>

    <script>
        const info = document.getElementById('info');
        const menuContainer = document.getElementById('menuContainer');
        const gameCanvas = document.getElementById('gameCanvas');
        const treeContainer = document.getElementById('treeContainer');
        const controlsBlock = document.getElementById('controlsBlock');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let audioContext = null;
        let analyser = null;
        let dataArray = null;
        let audioStream = null;

        // --- 📱 即時起動対応・ダイレクトタップシステム ---
        const menuRows = document.querySelectorAll('.menu-row');

        menuRows.forEach((row, idx) => {
            // スマホでの「触れた瞬間」の超高速レスポンスに対応
            row.addEventListener('touchstart', (e) => {
                e.preventDefault();
                executeGameStart(idx);
            });

            // PCブラウザでのデバッグ用マウスクリック
            row.addEventListener('click', (e) => {
                e.preventDefault();
                executeGameStart(idx);
            });
        });

        function executeGameStart(index) {
            menuContainer.style.display = 'none';
            // ゲーム画面内の描画崩れを防ぐため、ゲーム中のフォントをシステム標準にリセット
            document.body.style.fontFamily = "sans-serif";
            
            if (index === 0) runInvaderGame();
            else if (index === 1) runCatchGame();
            else if (index === 2) runTreeGame();
        }


        // =========================================================================
        // 🎮 1. SOUND INVADER
        // =========================================================================
        function runInvaderGame() {
            info.innerHTML = "👾をやっつけて！<br>ロングトーンでビーム発射！";
            gameCanvas.style.display = "block";
            gameCanvas.className = "border-invader";
            gameCanvas.height = 500;
            controlsBlock.style.display = "flex";

            leftBtn.className = "btn-move";
            rightBtn.className = "btn-move";
            leftBtn.innerText = "◀";
            rightBtn.innerText = "▶";

            const ctx = gameCanvas.getContext('2d');
            let isPlaying = false, isGameOver = false, isCountingDown = false, countdownNumber = 3;
            let score = 0, timeLeft = 30, timerInterval;
            let bullets = [], invaders = [], boss = null; 

            let player = { x: gameCanvas.width / 2, y: gameCanvas.height - 40, speed: 9 };
            let moveLeft = false, moveRight = false;
            let voiceDuration = 0, isBeaming = false, invaderSpawnTimer = 0, hasBossSpawned = false;

            const setBtnEvent = (btn, startFlag, endFlag) => {
                btn.onmousedown = (e) => { e.preventDefault(); startFlag(); };
                btn.onmouseup = (e) => { e.preventDefault(); endFlag(); };
                btn.onmouseleave = (e) => { e.preventDefault(); endFlag(); };
                btn.ontouchstart = (e) => { e.preventDefault(); startFlag(); };
                btn.ontouchend = (e) => { e.preventDefault(); endFlag(); };
            };
            setBtnEvent(leftBtn, () => moveLeft = true, () => moveLeft = false);
            setBtnEvent(rightBtn, () => moveRight = true, () => moveRight = false);

            const keyHandlerDown = (e) => { if (e.key === 'ArrowLeft') moveLeft = true; if (e.key === 'ArrowRight') moveRight = true; };
            const keyHandlerUp = (e) => { if (e.key === 'ArrowLeft') moveLeft = false; if (e.key === 'ArrowRight') moveRight = false; };
            window.addEventListener('keydown', keyHandlerDown);
            window.addEventListener('keyup', keyHandlerUp);

            startCountdown();
            initAudio();

            async function initAudio() {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioContext.state === 'suspended') await audioContext.resume();
                    const source = audioContext.createMediaStreamSource(audioStream);
                    analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                    source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
                } catch (err) { console.log(err); }
            }

            function startCountdown() {
                isCountingDown = true; countdownNumber = 3;
                const cdInterval = setInterval(() => {
                    countdownNumber--;
                    if (countdownNumber < 0) { clearInterval(cdInterval); isCountingDown = false; startGame(); }
                }, 1000);

                function countdownLoop() {
                    if (!isCountingDown) return;
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                    ctx.fillStyle = '#555'; ctx.fillRect(player.x - 20, player.y, 40, 15); ctx.fillRect(player.x - 5, player.y - 8, 10, 8);
                    ctx.fillStyle = '#0fa'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 70px sans-serif';
                    if (countdownNumber > 0) { ctx.fillText(countdownNumber, gameCanvas.width / 2, gameCanvas.height / 2); }
                    else { ctx.fillStyle = '#f0f'; ctx.fillText('START!', gameCanvas.width / 2, gameCanvas.height / 2); }
                    requestAnimationFrame(countdownLoop);
                }
                countdownLoop();
            }

            function startGame() {
                isPlaying = true;
                timerInterval = setInterval(() => { timeLeft--; if (timeLeft <= 0) endGame(); }, 1000);
                gameLoop();
            }

            function gameLoop() {
                if (!isPlaying) return;
                updateAudio(); updateGame(); checkCollisions(); drawGame();
                if (!isGameOver) requestAnimationFrame(gameLoop);
            }

            function updateAudio() {
                if (!analyser) return;
                analyser.getByteFrequencyData(dataArray);
                let total = 0; for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                let volume = total / dataArray.length;
                if (volume > 15) {
                    voiceDuration++; if (voiceDuration > 15) isBeaming = true;
                    if (isBeaming) {
                        bullets.push({ x: player.x, y: player.y - 10, width: Math.min(volume * 0.6, 50), height: 25, speed: 15, color: '#f0f', isBeam: true });
                    } else {
                        if (voiceDuration % 3 === 1) {
                            bullets.push({ x: player.x, y: player.y - 10, radius: Math.min(volume * 0.4, 30), speed: 9, color: '#0fa', isBeam: false });
                        }
                    }
                } else { voiceDuration = 0; isBeaming = false; }
            }

            function updateGame() {
                if (moveLeft) player.x -= player.speed; if (moveRight) player.x += player.speed;
                if (player.x < 20) player.x = 20; if (player.x > gameCanvas.width - 20) player.x = gameCanvas.width - 20;
                for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].y -= bullets[i].speed; if (bullets[i].y < -50) bullets.splice(i, 1); }
                invaderSpawnTimer++;
                let spawnInterval = 12;
                if (timeLeft > 20) spawnInterval = 48; else if (timeLeft <= 15) spawnInterval = 2;
                if (invaderSpawnTimer >= spawnInterval) {
                    let invaderSpeed = 1.5 + Math.random() * 2.0;
                    if (timeLeft > 20) invaderSpeed = 0.6 + Math.random() * 0.6; else if (timeLeft <= 15) invaderSpeed = 2.0 + Math.random() * 2.5;
                    invaders.push({ x: Math.random() * (gameCanvas.width - 50) + 25, y: -20, size: 22, speed: invaderSpeed });
                    invaderSpawnTimer = 0;
                }
                if (timeLeft <= 15 && !hasBossSpawned) { boss = { x: gameCanvas.width / 2, y: -50, size: 85, speed: 0.35, hp: 2000, maxHp: 2000 }; hasBossSpawned = true; }
                if (boss) { boss.y += boss.speed; if (boss.y > gameCanvas.height + 50) boss.y = -50; }
                for (let i = invaders.length - 1; i >= 0; i--) { invaders[i].y += invaders[i].speed; if (invaders[i].y > gameCanvas.height + 20) invaders.splice(i, 1); }
            }

            function checkCollisions() {
                for (let b = bullets.length - 1; b >= 0; b--) {
                    let bullet = bullets[b]; if (!bullet) continue;
                    if (boss) {
                        let dx = bullet.x - boss.x, dy = bullet.y - boss.y, dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < (bullet.radius || bullet.width/2) + boss.size/2.5) {
                            boss.hp -= bullet.isBeam ? 3 : 1; score += 20;
                            if (boss.hp <= 0) { boss = null; score += 20000; }
                            if (!bullet.isBeam) { bullets.splice(b, 1); continue; }
                        }
                    }
                    for (let i = invaders.length - 1; i >= 0; i--) {
                        let invader = invaders[i]; if (!bullet || !invader) continue;
                        let hit = false;
                        if (bullet.isBeam) {
                            let closeX = Math.max(bullet.x - bullet.width/2, Math.min(invader.x, bullet.x + bullet.width/2));
                            let closeY = Math.max(bullet.y, Math.min(invader.y, bullet.y + bullet.height));
                            if ((invader.x - closeX)**2 + (invader.y - closeY)**2 < invader.size**2) hit = true;
                        } else { if (Math.sqrt((bullet.x - invader.x)**2 + (bullet.y - invader.y)**2) < (bullet.radius + invader.size)) hit = true; }
                        if (hit) { invaders.splice(i, 1); score += 100; if (!bullet.isBeam) { bullets.splice(b, 1); break; } }
                    }
                }
            }

            function drawGame() {
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                ctx.fillStyle = '#fff'; ctx.fillRect(player.x - 20, player.y, 40, 15); ctx.fillRect(player.x - 5, player.y - 8, 10, 8);
                bullets.forEach(b => { ctx.fillStyle = b.color; if (!b.isBeam) { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill(); } else { ctx.fillRect(b.x - b.width / 2, b.y, b.width, b.height); } });
                if (boss) {
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = `${boss.size}px sans-serif`; ctx.fillText('👾', boss.x, boss.y);
                    ctx.font = `${boss.size * 0.55}px sans-serif`; ctx.fillText('👑', boss.x, boss.y - boss.size * 0.45);
                    let barWidth = 120, barHeight = 10; ctx.fillStyle = '#444'; ctx.fillRect(boss.x - barWidth/2, boss.y - boss.size/2 - 25, barWidth, barHeight);
                    ctx.fillStyle = '#0fa'; ctx.fillRect(boss.x - barWidth/2, boss.y - boss.size/2 - 25, barWidth * (Math.max(0, boss.hp) / boss.maxHp), barHeight);
                }
                invaders.forEach(inv => { ctx.font = `${inv.size * 1.3}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('👾', inv.x, inv.y); });
                ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(`SCORE: ${score}`, 15, 30);
                if (timeLeft <= 15) ctx.fillStyle = '#ff3333';
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, gameCanvas.width - 15, 30);
                if (isGameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '24px sans-serif'; ctx.fillText('ゲーム終了！', gameCanvas.width / 2, gameCanvas.height / 2 - 20);
                    ctx.fillStyle = '#0fa'; ctx.font = '22px sans-serif'; ctx.fillText(`最終スコア: ${score}`, gameCanvas.width / 2, gameCanvas.height / 2 + 30);
                }
            }

            function endGame() {
                isGameOver = true; clearInterval(timerInterval); drawGame();
                if (audioStream) audioStream.getTracks().forEach(track => track.stop());
                if (audioContext) audioContext.close();
            }
        }

        // =========================================================================
        // 🎮 2. AQUA CATCH
        // =========================================================================
        function runCatchGame() {
            info.innerHTML = "左右ボタンで白い丸を動かして<br>降ってくるノーツをキャッチ！";
            gameCanvas.style.display = "block";
            gameCanvas.className = "border-catch";
            gameCanvas.height = 480;
            controlsBlock.style.display = "flex";

            leftBtn.className = "btn-move btn-catch-style";
            rightBtn.className = "btn-move btn-catch-style";
            leftBtn.innerText = "◀";
            rightBtn.innerText = "▶";

            const ctx = gameCanvas.getContext('2d');
            let isPlaying = false, isGameOver = false, isCountingDown = false, countdownNumber = 3;
            let score = 0, combo = 0, timeLeft = 30, timerInterval;

            const spawnY = 60, judgeLowY = gameCanvas.height - 60, targetRadius = 32;
            const lanes = [100, 200, 300]; let currentLaneIndex = 1;
            let notes = [], nextSpawnCountdown = 0, splashEffects = [], fireworks = [];

            const moveLeft = () => { if (!isPlaying || isGameOver || isCountingDown) return; if (currentLaneIndex > 0) { currentLaneIndex--; checkImmediateCatch(); } };
            const moveRight = () => { if (!isPlaying || isGameOver || isCountingDown) return; if (currentLaneIndex < 2) { currentLaneIndex++; checkImmediateCatch(); } };

            leftBtn.onmousedown = (e) => { e.preventDefault(); moveLeft(); };
            leftBtn.ontouchstart = (e) => { e.preventDefault(); moveLeft(); };
            rightBtn.onmousedown = (e) => { e.preventDefault(); moveRight(); };
            rightBtn.ontouchstart = (e) => { e.preventDefault(); moveRight(); };

            const keyHandler = (e) => { if (e.key === "ArrowLeft") moveLeft(); if (e.key === "ArrowRight") moveRight(); };
            window.addEventListener('keydown', keyHandler);

            startCountdown();

            function startCountdown() {
                isCountingDown = true; countdownNumber = 3;
                const cdInterval = setInterval(() => {
                    countdownNumber--;
                    if (countdownNumber < 0) { clearInterval(cdInterval); isCountingDown = false; startGame(); }
                }, 1000);

                function countdownLoop() {
                    if (!isCountingDown) return;
                    ctx.fillStyle = '#020206'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                    lanes.forEach((laneX, idx) => {
                        ctx.strokeStyle = '#101025'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(laneX, spawnY); ctx.lineTo(laneX, judgeLowY); ctx.stroke();
                        ctx.strokeStyle = (idx === currentLaneIndex) ? 'rgba(0, 210, 255, 0.6)' : 'rgba(0, 150, 255, 0.1)';
                        ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(laneX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();
                    });
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 70px sans-serif';
                    if (countdownNumber > 0) { ctx.fillStyle = '#00ffff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ffff'; ctx.fillText(countdownNumber, gameCanvas.width / 2, gameCanvas.height / 2); }
                    else { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 25; ctx.shadowColor = '#ffffff'; ctx.fillText('START!', gameCanvas.width / 2, gameCanvas.height / 2); }
                    ctx.shadowBlur = 0; requestAnimationFrame(countdownLoop);
                }
                countdownLoop();
            }

            function startGame() {
                isPlaying = true; nextSpawnCountdown = 20;
                timerInterval = setInterval(() => { timeLeft--; if (timeLeft <= 0) endGame(); }, 1000);
                gameLoop();
            }

            function gameLoop() {
                if (!isPlaying) return;
                updateGame(); drawGame();
                if (!isGameOver) requestAnimationFrame(gameLoop);
            }

            function updateGame() {
                nextSpawnCountdown--;
                if (nextSpawnCountdown <= 0) {
                    notes.push({ lane: Math.floor(Math.random() * 3), progress: 0, speed: 0.012 + Math.random() * 0.006 });
                    nextSpawnCountdown = Math.floor(Math.random() * 25) + 20;
                }
                for (let i = notes.length - 1; i >= 0; i--) {
                    notes[i].progress += notes[i].speed;
                    if (notes[i].lane === currentLaneIndex && notes[i].progress >= 0.96 && notes[i].progress <= 1.04) { checkJudgment(currentLaneIndex); continue; }
                    if (notes[i].progress > 1.12) { notes.splice(i, 1); combo = 0; }
                }
                for (let i = splashEffects.length - 1; i >= 0; i--) {
                    let fx = splashEffects[i]; fx.radius1 += 2.2; fx.radius2 += 1.6; fx.dropY -= 1.8; fx.alpha -= 0.04; if (fx.alpha <= 0) splashEffects.splice(i, 1);
                }
                for (let i = fireworks.length - 1; i >= 0; i--) {
                    let fw = fireworks[i]; fw.delay--;
                    if (fw.delay <= 0) { fw.state = "explode"; fw.alpha -= 0.016; fw.radius += fw.expandSpeed; fw.expandSpeed *= 0.94; }
                    if (fw.alpha <= 0) fireworks.splice(i, 1);
                }
            }

            function checkImmediateCatch() { checkJudgment(currentLaneIndex); }

            function checkJudgment(activeLane) {
                let targetIndex = -1, maxProgress = -1;
                for(let i=0; i<notes.length; i++) { if(notes[i].lane === activeLane && notes[i].progress > maxProgress) { maxProgress = notes[i].progress; targetIndex = i; } }
                if (targetIndex === -1) return;
                let note = notes[targetIndex], diff = Math.abs(note.progress - 1.0), currentX = lanes[note.lane], currentY = judgeLowY;
                if (diff < 0.12) {
                    splashEffects.push({ x: currentX, y: currentY, radius1: 5, radius2: 2, dropY: currentY - 5, color: "#ffffff", colorCyan: "#00f0ff", alpha: 1.0 });
                    score += 150; combo++; notes.splice(targetIndex, 1);
                    if (combo >= 5) { triggerFireworkShow(currentX, currentY); combo = 0; }
                }
            }

            function triggerFireworkShow(originX, originY) {
                const pastelColors = ["#ffffff", "#ffb7d5", "#b2ebf2", "#fff59d", "#e0ffff", "#e1bee7"];
                for (let i = 0; i < 5; i++) {
                    let fireworkX = originX + (Math.random() * 120 - 60), fireworkY = originY - Math.random() * 140 - 40;
                    if(fireworkX < 30) fireworkX = 30; if(fireworkX > gameCanvas.width - 30) fireworkX = gameCanvas.width - 30;
                    fireworks.push({ x: fireworkX, y: fireworkY, radius: 3, maxRadius: Math.random() * 5 + 37, expandSpeed: 2.5 + Math.random() * 1.0, color: pastelColors[Math.floor(Math.random() * pastelColors.length)], alpha: 1.0, delay: i * 5, state: "wait" });
                }
                score += 1000;
            }

            function drawGame() {
                ctx.fillStyle = '#020206'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                lanes.forEach((laneX, idx) => {
                    ctx.strokeStyle = '#101025'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(laneX, spawnY); ctx.lineTo(laneX, judgeLowY); ctx.stroke();
                    ctx.strokeStyle = 'rgba(20, 20, 45, 0.4)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, judgeLowY); ctx.lineTo(gameCanvas.width, judgeLowY); ctx.stroke();
                });
                let playerX = lanes[currentLaneIndex];
                ctx.save(); ctx.shadowBlur = 20; ctx.shadowColor = "#00d2ff"; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(playerX, judgeLowY, 18, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(playerX, judgeLowY, 8, 0, Math.PI * 2); ctx.fill(); ctx.restore();

                splashEffects.forEach(fx => {
                    ctx.save(); ctx.globalAlpha = fx.alpha; ctx.strokeStyle = fx.colorCyan; ctx.lineWidth = 2; ctx.shadowBlur = 10; ctx.shadowColor = fx.colorCyan; ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.radius1, 0, Math.PI * 2); ctx.stroke();
                    ctx.strokeStyle = fx.color; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.radius2, 0, Math.PI * 2); ctx.stroke();
                    ctx.fillStyle = "#ffffff"; ctx.shadowColor = "#ffffff"; ctx.beginPath(); ctx.arc(fx.x, fx.dropY, 4, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });
                fireworks.forEach(fw => {
                    if (fw.state === "explode") {
                        ctx.save(); ctx.globalAlpha = fw.alpha; ctx.shadowBlur = fw.radius * 2.2; ctx.shadowColor = fw.color; ctx.strokeStyle = fw.color; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius, 0, Math.PI * 2); ctx.stroke();
                        ctx.shadowBlur = 15; ctx.lineWidth = 1.5; ctx.strokeStyle = "#ffffff"; ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.9, 0, Math.PI * 2); ctx.stroke();
                        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.15, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                    }
                });
                notes.forEach(note => {
                    let currentX = lanes[note.lane], currentY = spawnY + (judgeLowY - spawnY) * note.progress, currentRadius = 4 + (12 * note.progress);
                    ctx.save(); ctx.shadowBlur = 10; ctx.shadowColor = "#0099ff";
                    let gradient = ctx.createRadialGradient(currentX, currentY, 1, currentX, currentY, currentRadius);
                    gradient.addColorStop(0, '#ffffff'); gradient.addColorStop(0.6, '#dbf0ff'); gradient.addColorStop(1, "#0077ff");
                    ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(currentX, currentY, currentRadius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                });
                ctx.save(); ctx.strokeStyle = "#151525"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(gameCanvas.width - 40, 75, 15, 0, Math.PI * 2); ctx.stroke();
                if (combo > 0) { ctx.shadowBlur = 10; ctx.shadowColor = "#ffffff"; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 4; let progressAngle = (combo / 5) * Math.PI * 2; ctx.beginPath(); ctx.arc(gameCanvas.width - 40, 75, 15, -Math.PI / 2, (-Math.PI / 2) + progressAngle); ctx.stroke(); }
                ctx.restore();

                ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(`SCORE: ${score}`, 20, 40);
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, gameCanvas.width - 20, 40);

                if (isGameOver) {
                    ctx.fillStyle = 'rgba(1, 1, 5, 0.93)'; ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '24px sans-serif'; ctx.fillText('タイムアップ！', gameCanvas.width / 2, gameCanvas.height / 2 - 30);
                    ctx.fillStyle = '#00ffff'; ctx.font = 'bold 26px sans-serif'; ctx.fillText(`最終スコア: ${score}`, gameCanvas.width / 2, gameCanvas.height / 2 + 20);
                }
            }

            function endGame() { isGameOver = true; clearInterval(timerInterval); drawGame(); }
        }

        // =========================================================================
        // 🎮 3. HEALING TREE
        // =========================================================================
        function runTreeGame() {
            info.innerHTML = "穏やかな語りかけ・音楽で<br>宝石を咲かせましょう";
            treeContainer.style.display = "block";

            const canvas = document.getElementById('treeCanvas');
            const ctx = canvas.getContext('2d');
            let isPlaying = false, isGameOver = false, isCountingDown = false, countdownNumber = 3;
            let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];
            const centerX = canvas.width / 2, centerY = canvas.height / 2;

            let animId;
            function animate() { drawGame(); animId = requestAnimationFrame(animate); }
            animate();

            flowers = []; const totalFlowers = 350;
            for(let i = 0; i < totalFlowers; i++) {
                let angle = Math.random() * Math.PI * 2; let dist = Math.pow(Math.random(), 0.8) * 140;
                flowers.push({ x: centerX + Math.cos(angle) * dist, y: centerY + Math.sin(angle) * dist, color: ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"][Math.floor(Math.random() * 6)], maxSize: Math.random() * 3.5 + 2.5, requiredProgress: 0.01 + Math.random() * 0.98, sparkleOffset: Math.random() * 100 });
            }

            startCountdown();
            initAudio();

            async function initAudio() {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioContext.state === 'suspended') await audioContext.resume();
                    const source = audioContext.createMediaStreamSource(audioStream);
                    analyser = audioContext.createAnalyser(); analyser.fftSize = 256;
                    source.connect(analyser); dataArray = new Uint8Array(analyser.frequencyBinCount);
                } catch (err) { console.log('マイクなしモード'); }
            }

            function startCountdown() {
                isCountingDown = true; countdownNumber = 3;
                const cdInterval = setInterval(() => { countdownNumber--; if (countdownNumber < 0) { clearInterval(cdInterval); isCountingDown = false; startGame(); } }, 1000);
            }

            function startGame() {
                isPlaying = true;
                timerInterval = setInterval(() => { timeLeft--; if (bloomProgress < (30 - timeLeft) * 0.01) { bloomProgress = (30 - timeLeft) * 0.01; } if (timeLeft <= 0) endGame(); }, 1000);
            }

            function updateAudio() {
                if (!analyser) return;
                analyser.getByteFrequencyData(dataArray);
                let total = 0; for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                let currentVolume = total / dataArray.length;

                // 🎤 判定基準を 5 まで大幅ダウンし、少しの音でも検知可能に
                if (currentVolume > 5) { 
                    // 加算効率も引き上げ、開花をスムーズに
                    bloomProgress += 0.0035; 
                    if (bloomProgress > 1.1) bloomProgress = 1.1; 
                }
            }

            function drawGame() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (isCountingDown) {
                    ctx.save(); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 75px sans-serif';
                    if (countdownNumber > 0) { ctx.fillStyle = '#e1bee7'; ctx.shadowBlur = 20; ctx.shadowColor = '#e1bee7'; ctx.fillText(countdownNumber, centerX, centerY); }
                    else { ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 25; ctx.shadowColor = '#ffffff'; ctx.fillText('START!', centerX, centerY); }
                    ctx.restore(); return;
                }
                if (isPlaying) {
                    updateAudio(); let now = Date.now();
                    flowers.forEach(f => {
                        if (bloomProgress >= f.requiredProgress) {
                            ctx.save(); ctx.globalAlpha = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                            let currentSize = f.maxSize * Math.min(1.0, (bloomProgress - f.requiredProgress) * 4 + 0.15);
                            ctx.shadowBlur = currentSize * 2.2; ctx.shadowColor = f.color; ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();
                            ctx.shadowBlur = 0; ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                        }
                    });
                    let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
                    ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = '16px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 20, 35);
                    ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 35);
                    if (isGameOver) {
                        ctx.fillStyle = 'rgba(2, 2, 6, 0.95)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '20px sans-serif'; ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 25);
                        ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 24px sans-serif'; ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 25);
                    }
                }
            }

            function endGame() { isGameOver = true; clearInterval(timerInterval); drawGame(); cancelAnimationFrame(animId); if (audioStream) audioStream.getTracks().forEach(t => t.stop()); if (audioContext) audioContext.close(); }
        }
    </script>
