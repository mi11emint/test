<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界樹の開花 - Healing Tree</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
            display: block; /* 最初から表示しておきます */
        }
        #startBtn {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            z-index: 100;
            margin-bottom: 15px;
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや音楽で、大樹の中央に宝石を咲かせましょう</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        // 🌳 画像ファイルを読み込み
        const treeImg = new Image();
        treeImg.src = 'tree.png'; 

        let audioContext, analyser, dataArray, audioStream;
        let isPlaying = false, isGameOver = false;
        let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];
        let imgLoaded = false;

        treeImg.onload = () => { 
            imgLoaded = true; 
        };

        // 🔄 ゲームが始まっていなくても、常に画面を秒間60回描き直すループを起動
        // これにより、画像の読み込みが完了した瞬間に自動で画面に表示されます
        function animate() {
            drawGame();
            requestAnimationFrame(animate);
        }
        animate();

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;

            // 1. ボタンを「何よりも最優先で」即座に消す
            startBtn.style.display = 'none';
            isPlaying = true;
            isGameOver = false;
            timeLeft = 30;
            bloomProgress = 0;

            // 2. 花の配置を計算（中央に丸く）
            flowers = [];
            const totalFlowers = 350; 
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 - 40; 

            for(let i = 0; i < totalFlowers; i++) {
                let angle = Math.random() * Math.PI * 2; 
                let dist = Math.pow(Math.random(), 0.8) * 150; 
                
                let fx = centerX + Math.cos(angle) * dist;
                let fy = centerY + Math.sin(angle) * dist;

                const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                let required = 0.01 + Math.random() * 0.98;

                flowers.push({
                    x: fx, y: fy,
                    color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                    maxSize: Math.random() * 3.5 + 2.5,
                    requiredProgress: required,
                    sparkleOffset: Math.random() * 100
                });
            }

            // 3. タイマースタート
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) endGame();
            }, 1000);

            // 4. 最後にマイクを起動（ポップアップで画面が止まっても裏で描画は維持されます）
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch (err) {
                // マイクが拒否されても、ゲーム（タイマー）自体は止まらないようにする安全策
                console.log('マイクなしモードで実行します');
            }
        });

        // 毎フレームの音量チェック
        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let avg = total / dataArray.length;

            if (avg > 15) {
                bloomProgress += 0.00085; 
                if (bloomProgress > 1.1) bloomProgress = 1.1; 
            }
        }

        // 画面の描画処理（常に呼び出され続けます）
        function drawGame() {
            if (isPlaying) {
                updateAudio();
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 世界樹（画像）の描画
            ctx.save();
            if (imgLoaded) {
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = 0.4; 
                ctx.drawImage(treeImg, 50, 50, 400, 400);
            } else {
                // 万が一画像がまだ読み込めていない場合の文字表示
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('画像を読み込み中...', 250, 250);
            }
            ctx.restore();

            // ゲーム中の場合のみ、花とUIを描画
            if (isPlaying) {
                // 2. 宝石の花の描画
                ctx.globalCompositeOperation = 'source-over';
                let now = Date.now();
                flowers.forEach(f => {
                    if (bloomProgress >= f.requiredProgress) {
                        ctx.save();
                        let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                        ctx.globalAlpha = sparkle;
                        
                        let timeSinceBloom = bloomProgress - f.requiredProgress;
                        let sizeGrowth = Math.min(1.0, timeSinceBloom * 4 + 0.15); 
                        let currentSize = f.maxSize * sizeGrowth;

                        ctx.shadowBlur = currentSize * 2.2;
                        ctx.shadowColor = f.color;
                        ctx.fillStyle = f.color;
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.fillStyle = "#ffffff";
                        ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill();
                        ctx.restore();
                    }
                });

                // UI表示
                let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '15px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
                ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

                if (isGameOver) {
                    ctx.fillStyle = 'rgba(2, 2, 6, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '22px sans-serif';
                    ctx.fillText('時の砂が尽きました', 250, 220);
                    ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 26px sans-serif';
                    ctx.fillText(`最終開花度: ${displayPercent}%`, 250, 270);
                }
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            setTimeout(() => {
                startBtn.textContent = 'もう一度育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
