<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D音声リズムゲーム（ノーツ発光版）</title>
    <style>
        body {
            margin: 0;
            background-color: #05050a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #334;
            background-color: #020208;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 20px rgba(0,255,255,0.1);
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 15px #00ffff;
        }
        #info {
            font-size: 14px;
            color: #889;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">【高低判別】奥から迫る白丸をタイミングよく鳴らそう！上＝高音、下＝低音🎤👏</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 30;
        let timerInterval;

        // 画面中央奥（消失点）の座標
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // 2つの判定マウント位置（上＝高音用、下＝低音用）
        const judgeHighY = 70;
        const judgeLowY = canvas.height - 70;
        const targetRadius = 32;

        // ノーツ配列
        let notes = [];
        let nextSpawnCountdown = 0;

        // エフェクト配列（叩いた瞬間のノーツ大発光を管理）
        let hitEffects = [];

        // 入力制限
        let canInput = true;
        let inputCooldown = 0;

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                combo = 0;
                maxCombo = 0;
                timeLeft = 30;
                notes = [];
                hitEffects = [];
                nextSpawnCountdown = 20;
                startBtn.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            updateGame();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            let total = 0;
            let maxVal = 0;
            let maxIndex = 0;

            for (let i = 0; i < dataArray.length; i++) {
                total += dataArray[i];
                if (dataArray[i] > maxVal) {
                    maxVal = dataArray[i];
                    maxIndex = i; // 一番強く出ている周波数（音の高さ）
                }
            }
            let volume = total / dataArray.length;
            const threshold = 20; 

            if (inputCooldown > 0) {
                inputCooldown--;
                if (inputCooldown === 0) canInput = true;
            }

            if (volume > threshold && canInput) {
                // 音の高さ判定（インデックス15以上を高音、未満を低音とする）
                let isHighPitch = maxIndex >= 15;
                checkJudgment(isHighPitch); 
                canInput = false;
                inputCooldown = 10; 
            }
        }

        function updateGame() {
            // 🎵 リズムのランダム生成
            nextSpawnCountdown--;
            if (nextSpawnCountdown <= 0) {
                // 50%の確率で高い音（上行き）か低い音（下行き）をランダム決定
                let type = Math.random() > 0.5 ? "high" : "low";
                notes.push({
                    type: type,
                    progress: 0, // 0(奥) 〜 1(手前の判定ライン) までの進捗率
                    speed: 0.015 + Math.random() * 0.01 // 迫ってくる速度もランダム
                });
                nextSpawnCountdown = Math.floor(Math.random() * 40) + 20;
            }

            // ノーツの移動（奥から手前へ）
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].progress += notes[i].speed;

                // 判定ラインを完全に通り過ぎた（MISS）
                if (notes[i].progress > 1.15) {
                    notes.splice(i, 1);
                    combo = 0;
                }
            }

            // 発光エフェクトの寿命更新
            for (let i = hitEffects.length - 1; i >= 0; i--) {
                hitEffects[i].alpha -= 0.06; // 徐々に消える
                hitEffects[i].radius += 2;    // 光が広がる
                if (hitEffects[i].alpha <= 0) {
                    hitEffects.splice(i, 1);
                }
            }
        }

        // 🎯 判定＆エフェクトトリガー
        function checkJudgment(isHighInput) {
            // 入力された高さ（上か下か）に一致する、最も手前に迫っているノーツを探す
            let targetType = isHighInput ? "high" : "low";
            let targetIndex = -1;
            let maxProgress = -1;

            for(let i=0; i<notes.length; i++) {
                if(notes[i].type === targetType && notes[i].progress > maxProgress) {
                    maxProgress = notes[i].progress;
                    targetIndex = i;
                }
            }

            if (targetIndex === -1) return; // 対象ノーツがなければ空振り
            
            let note = notes[targetIndex];
            // progressが 1.0 に近いほどパーフェクト
            let diff = Math.abs(note.progress - 1.0);

            let currentY = note.type === "high" ? centerY - (centerY - judgeHighY) * note.progress : centerY + (judgeLowY - centerY) * note.progress;

            // ⭐【修正】タイミングによる「ノーツ自体の発光」エフェクトを生成
            if (diff < 0.07) {
                // グレート（超発光・白）
                hitEffects.push({
                    x: centerX,
                    y: currentY,
                    radius: targetRadius,
                    color: "#ffffff", // 真っ白
                    blur: 40,         // 強烈な輝き
                    alpha: 1.0
                });
                score += 150 + combo * 5;
                combo++;
                notes.splice(targetIndex, 1);
            } else if (diff < 0.18) {
                // グッド（弱い薄青発光）
                hitEffects.push({
                    x: centerX,
                    y: currentY,
                    radius: targetRadius,
                    color: "#88ccff", // 薄青
                    blur: 15,         // 優しい輝き
                    alpha: 0.7
                });
                score += 50;
                combo++;
                notes.splice(targetIndex, 1);
            }
        }

        function drawGame() {
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3D空間のレーンガイド線（奥から上下に広がる線）
            ctx.strokeStyle = '#151535';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, judgeHighY);
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, judgeLowY);
            ctx.stroke();

            // 🎯 上下の判定リングの描画
            // 上（高音）
            ctx.strokeStyle = 'rgba(255, 0, 150, 0.4)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(centerX, judgeHighY, targetRadius, 0, Math.PI * 2); ctx.stroke();
            // 下（低音）
            ctx.strokeStyle = 'rgba(0, 150, 255, 0.4)';
            ctx.beginPath(); ctx.arc(centerX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();


            // ⭐【超発光エフェクトの描画】叩いた瞬間のノーツの残像大爆発！
            hitEffects.forEach(fx => {
                ctx.save();
                ctx.globalAlpha = fx.alpha;
                ctx.shadowBlur = fx.blur;
                ctx.shadowColor = fx.color;
                
                ctx.fillStyle = fx.color;
                ctx.beginPath();
                ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });


            // 🎵 流れてくる「白いノーツ」の描画（奥から手前に迫る）
            notes.forEach(note => {
                // progress(0〜1)を使って、中央奥から上下へ移動する座標を計算
                let currentY = centerY;
                let auraColor = "#ff00aa"; // 高音のオーラ色

                if (note.type === "high") {
                    currentY = centerY - (centerY - judgeHighY) * note.progress;
                    auraColor = "rgba(255, 0, 100, ";
                } else {
                    currentY = centerY + (judgeLowY - centerY) * note.progress;
                    auraColor = "rgba(0, 100, 255, ";
                }

                // 奥にいるときは小さく、手前に来るほど判定サイズ（18）まで大きくなる
                let currentRadius = 2 + (16 * note.progress);

                ctx.save();
                // ノーツの周りにうっすら高音・低音のオーラを纏わせる
                ctx.shadowBlur = 12;
                ctx.shadowColor = note.type === "high" ? "#ff0066" : "#0099ff";
                
                // 本体は綺麗な「白い光の球」
                let gradient = ctx.createRadialGradient(centerX, currentY, 1, centerX, currentY, currentRadius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.6, '#f0f5ff');
                gradient.addColorStop(1, note.type === "high" ? "#ff0066" : "#0088ff");
                ctx.fillStyle = gradient;

                ctx.beginPath();
                ctx.arc(centerX, currentY, currentRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // UI表示
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 40);

            if (combo > 0) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 22px sans-serif';
                ctx.fillStyle = '#00ffff';
                ctx.fillText(`${combo} COMBO`, centerX, centerY - 20);
            }

            // 🛑 リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 10, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('ゲーム終了！', centerX, centerY - 40);
                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, centerX, centerY + 10);
                ctx.fillStyle = '#00ffaa';
                ctx.font = '18px sans-serif';
                ctx.fillText(`最高コンボ: ${maxCombo}`, centerX, centerY + 50);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度遊ぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
