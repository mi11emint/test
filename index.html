<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響ヒーリングゲーム：世界樹の開花</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #1a1a2e;
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(180, 200, 255, 0.05);
            border-radius: 8px;
        }
        #startBtn {
            padding: 14px 28px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 190, 231, 0.7);
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや静かな音楽で、世界樹に宝石の花を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let timeLeft = 30;
        let timerInterval;
        
        // 開花コントロール
        let bloomProgress = 0; // 0.0 〜 1.0 (1.0で20秒時点の満開)
        let maxBloomProgress = 1.5; // 30秒まで咲き続けられる上限
        let flowers = [];
        
        // 世界樹の骨組み（固定の枝データ）をあらかじめ生成
        let treeBranches = [];

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // 初期化
                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                flowers = [];
                startBtn.style.display = 'none';

                // 世界樹の枝の生成
                treeBranches = [];
                generateTree(canvas.width / 2, canvas.height - 40, -Math.PI / 2, 85, 9);

                // タイマー
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        // 再帰アルゴリズムで世界樹の枝骨組みをビルド
        function generateTree(x, y, angle, length, depth) {
            if (depth === 0) return;

            let x2 = x + Math.cos(angle) * length;
            let y2 = y + Math.sin(angle) * length;

            treeBranches.push({ x1: x, y1: y, x2: x2, y2: y2, depth: depth });

            // 枝の先の方に、花が咲く候補地をたくさん登録
            if (depth <= 6) {
                let flowerCount = (7 - depth) * 2;
                for(let i=0; i<flowerCount; i++) {
                    let t = Math.random(); // 枝のどの位置に咲くか
                    let fx = x + (x2 - x) * t;
                    let fy = y + (y2 - y) * t;
                    
                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    flowers.push({
                        x: fx,
                        y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        size: Math.random() * 5 + 4,
                        requiredProgress: Math.random() * 1.0, // どのくらいゲージが進んだら咲くか(0〜1.0で満開)
                        sparkleOffset: Math.random() * 100
                    });
                }
            }

            let numBranches = Math.floor(Math.random() * 2) + 2; // 2〜3本に分岐
            for (let i = 0; i < numBranches; i++) {
                let newAngle = angle + (Math.random() * 0.7 - 0.35);
                let newLength = length * (0.7 + Math.random() * 0.15);
                generateTree(x2, y2, newAngle, newLength, depth - 1);
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let totalVolume = 0;
            for (let i = 0; i < dataArray.length; i++) {
                totalVolume += dataArray[i];
            }
            let avgVolume = totalVolume / dataArray.length;

            // ⭐【癒やし検知システム】
            // 激しい一瞬の音ではなく、静かに話しかけている音量（基準15以上）を感知
            if (avgVolume > 15) {
                // 穏やかに声を出し続けると、20秒で満開（1.0）になるペースで加算
                // （60fps換算で 1秒間に0.05進む ＝ 20秒で1.0）
                bloomProgress += 0.00085; 
                if (bloomProgress > maxBloomProgress) bloomProgress = maxBloomProgress;
            }
        }

        function drawGame() {
            // 深い夜空のような黒背景
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 世界樹の幹と枝を描画（シックなグレー）
            treeBranches.forEach(b => {
                ctx.save();
                ctx.strokeStyle = `rgba(120, 128, 140, ${0.2 + (b.depth * 0.08)})`;
                ctx.lineWidth = b.depth * 0.8;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(b.x1, b.y1);
                ctx.lineTo(b.x2, b.y2);
                ctx.stroke();
                ctx.restore();
            });

            // 2. 宝石の花を描画
            let now = Date.now();
            flowers.forEach(f => {
                // 現在の進行度が、花の開花条件を超えていたら咲かせる
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    
                    // 宝石のようなパステル超発光を表現
                    // 時間経過で個別に優しくキラキラと明滅する
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = f.color;
                    
                    // 外側の淡い光の輪（宝石の輝き）
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    // 進行度に応じてツボミから少しずつ大きくなる
                    let currentSize = f.size * Math.min(1.5, (bloomProgress - f.requiredProgress) * 4 + 0.5);
                    ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();

                    // 内側の眩しい白い芯（宝石のきらめき）
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize * 0.4, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            // 3. 上部UI（残り時間と開花パーセンテージ）
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '15px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            // 下部にうっすらと音の感知を伝えるインジケーター
            ctx.fillStyle = 'rgba(144, 164, 174, 0.15)';
            ctx.textAlign = 'center';
            if (bloomProgress < maxBloomProgress && !isGameOver) {
                ctx.fillText(".. 穏やかな声を感知中 ..", canvas.width/2, canvas.height - 15);
            }

            // 🛑 リザルト（タイムアップ時）
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffb7d5';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffb7d5';
                ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度世界樹を育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
