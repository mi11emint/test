<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声インベーダー テスト</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #555;
            background-color: #000;
            max-width: 100%;
            max-height: 70vh;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #0fa;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">マイクを許可して、声を出してみてね！</div>
    <button id="startBtn">マイクを起動してスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;

        // ゲームオブジェクトの管理
        let bullets = [];
        let player = { x: canvas.width / 2, y: canvas.height - 30 };

        // 音声検知用の変数
        let voiceDuration = 0; // 音が続いている時間カウント
        let isBeaming = false;

        // スタートボタンを押した時の処理
        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            
            try {
                // マイクアクセスの許可を取得
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // Web Audio API の設定
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; // 音量の解析度
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                isPlaying = true;
                startBtn.style.display = 'none'; // ボタンを隠す
                
                // ゲームループ開始
                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        // メインのゲームループ（1秒間に約60回実行される）
        function gameLoop() {
            if (!isPlaying) return;

            updateAudio(); // 音声の解析
            updateGame();  // ゲーム状態の更新（弾の移動など）
            drawGame();    // 画面の描画

            requestAnimationFrame(gameLoop);
        }

        // 音声を解析して弾を発射する処理
        function updateAudio() {
            analyser.getByteFrequencyData(dataArray);
            
            // 音量の平均値を計算
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) {
                total += dataArray[i];
            }
            let volume = total / dataArray.length; // 0 〜 255 の値

            // しきい値（これ以上の音量で反応する）
            const threshold = 35; 

            if (volume > threshold) {
                voiceDuration++; // 音が続いている時間を増やす

                // 20フレーム（約0.3秒）以上音が続いたらビームモードに移行
                if (voiceDuration > 20) {
                    isBeaming = true;
                }

                // 弾・ビームの生成/更新
                if (isBeaming) {
                    // ビームの場合は、最新の弾を縦に伸ばす、または新しく太いビームを出す
                    // ここでは簡易的に、常に上向きに伸びるビームを生成
                    bullets.push({
                        x: player.x,
                        y: player.y - 10,
                        width: Math.min(volume * 0.4, 40), // 音量で太さが変わる
                        height: 30,
                        speed: 12,
                        color: '#f0f' // ビームはピンク
                    });
                } else {
                    // 通常の弾（単発）は、音量に応じた大きさ（半径）にする
                    // 連射しすぎないように5フレームに1発制限
                    if (voiceDuration % 5 === 1) {
                        bullets.push({
                            x: player.x,
                            y: player.y - 10,
                            radius: Math.min(volume * 0.3, 30), // 音量でサイズが変わる
                            speed: 7,
                            color: '#0fa', // 通常弾は緑
                            isBeam: false
                        });
                    }
                }
            } else {
                // 音が途切れたらリセット
                voiceDuration = 0;
                isBeaming = false;
            }
        }

        // 弾の移動処理
        function updateGame() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                
                // 画面外に出た弾を削除
                if (bullets[i].y < -50) {
                    bullets.splice(i, 1);
                }
            }
        }

        // 画面の描画
        function drawGame() {
            // 画面をクリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー（自機）を描画
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 15, player.y, 30, 15);

            // 弾を描画
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                if (bullet.radius !== undefined) {
                    // 通常の丸い弾
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // ビーム（四角形）
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                }
            });
        }
    </script>
</body>
</html>
