<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音響ヒーリングゲーム：世界樹の開花 (超密集大樹版)</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #1a1a2e;
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 30px rgba(180, 200, 255, 0.05);
            border-radius: 8px;
        }
        #startBtn {
            padding: 14px 28px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            transition: all 0.3s;
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(225, 190, 231, 0.7);
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや静かな音楽で、大樹に宝石の花を咲かせましょう（30秒）</div>
    <button id="startBtn">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let timeLeft = 30;
        let timerInterval;
        
        let bloomProgress = 0; // 0.0 〜 1.0 (1.0で20秒時点の満開)
        let maxBloomProgress = 1.3; 
        let flowers = [];
        let treeBranches = [];

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                flowers = [];
                treeBranches = [];
                startBtn.style.display = 'none';

                // ⭐【密集化の土台】主幹の長さをさらに調整し、分岐の深さを「7」に抑えつつ、1回あたりの分岐数を増やして密集させます
                generateTree(canvas.width / 2, canvas.height - 35, -Math.PI / 2, 75, 7);

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        // ⭐【修正】1箇所から3〜4本に大分岐させ、イラストのような横広がりの超密集大樹にするアルゴリズム
        function generateTree(x, y, angle, length, depth) {
            if (depth === 0) return;

            let x2 = x + Math.cos(angle) * length;
            let y2 = y + Math.sin(angle) * length;

            treeBranches.push({ x1: x, y1: y, x2: x2, y2: y2, depth: depth });

            // 枝が細くなる後半（depthが4以下）に花を散りばめる
            if (depth <= 4) { 
                let flowerCount = 6; // 1本の枝につき6個
                for(let i=0; i<flowerCount; i++) {
                    let t = Math.random(); 
                    let fx = x + (x2 - x) * t;
                    let fy = y + (y2 - y) * t;
                    
                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    
                    // ⭐【開花率バグの完全修正】0.01〜1.0 の間に均等に蕾の開花条件をバラけさせる
                    let required = 0.01 + Math.random() * 0.99;

                    flowers.push({
                        x: fx,
                        y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        size: Math.random() * 3 + 3.5, // 密集したときに美しく重なるサイズ
                        requiredProgress: required, 
                        sparkleOffset: Math.random() * 100
                    });
                }
            }

            // ⭐【修正】2分岐ではなく、3〜4分岐にして圧倒的な枝の密集度を作る
            let numBranches = (depth > 5) ? 3 : 4; 

            for (let i = 0; i < numBranches; i++) {
                // 扇状に大きく、横にもしっかりと広がるように角度を設定
                let angleSpread = (depth > 5) ? 1.0 : 0.7; // 主幹の時は広く
                
                // 均等に扇形に広げつつ、ランダムな揺らぎを加える
                let factor = (i / (numBranches - 1)) - 0.5; // -0.5 〜 0.5 の範囲
                let newAngle = angle + (factor * angleSpread) + (Math.random() * 0.15 - 0.075);
                
                // 次の枝の長さ
                let shrinkFactor = (depth > 5) ? 0.72 : 0.68;
                let newLength = length * shrinkFactor * (0.85 + Math.random() * 0.3);

                generateTree(x2, y2, newAngle, newLength, depth - 1);
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);

            let totalVolume = 0;
            for (let i = 0; i < dataArray.length; i++) {
                totalVolume += dataArray[i];
            }
            let avgVolume = totalVolume / dataArray.length;

            if (avgVolume > 15) {
                // 約20秒で100%(1.0)に達する安定した開花ペース
                bloomProgress += 0.00085; 
                if (bloomProgress > maxBloomProgress) bloomProgress = maxBloomProgress;
            }
        }

        function drawGame() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 世界樹の圧倒的な密集枝群の描画
            treeBranches.forEach(b => {
                ctx.save();
                // 枝が奥深く重なっているように、少しずつ透明度を調整
                ctx.strokeStyle = `rgba(125, 135, 145, ${0.12 + (b.depth * 0.09)})`;
                
                // 根元の幹（depth=7, 6）をどっしりと極太に、先は細く
                let thickness = b.depth * 1.2;
                if(b.depth >= 6) thickness = b.depth * 2.8; 
                ctx.lineWidth = thickness; 
                
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(b.x1, b.y1);
                ctx.lineTo(b.x2, b.y2);
                ctx.stroke();
                ctx.restore();
            });

            // 2. 宝石の花を描画（パーセンテージ連動型）
            let now = Date.now();
            flowers.forEach(f => {
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    
                    // 咲いたばかりの花（進行度がギリギリ）は淡く小さく、
                    // 満開（100%）に近づくほどふっくら大きく光り輝くための計算
                    let timeSinceBloom = bloomProgress - f.requiredProgress;
                    let sizeGrowth = Math.min(1.2, timeSinceBloom * 6 + 0.25); 
                    let currentSize = f.size * sizeGrowth;

                    ctx.shadowBlur = currentSize * 2.5;
                    ctx.shadowColor = f.color;
                    
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();

                    // 宝石のきらめきコア
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                }
            });

            // UIテキスト
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.font = '15px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            // インジケーター
            ctx.fillStyle = 'rgba(144, 164, 174, 0.15)';
            ctx.textAlign = 'center';
            if (bloomProgress < 1.0 && !isGameOver) {
                ctx.fillText(".. 穏やかな声を感知中 ..", canvas.width/2, canvas.height - 15);
            }

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('時の砂が尽きました', canvas.width / 2, canvas.height / 2 - 30);
                
                ctx.fillStyle = '#ffb7d5';
                ctx.font = 'bold 28px sans-serif';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffb7d5';
                ctx.fillText(`最終開花度: ${displayPercent}%`, canvas.width / 2, canvas.height / 2 + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度世界樹を育てる';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2500);
        }
    </script>
</body>
</html>
