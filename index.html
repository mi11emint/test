<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Wave Movie Maker</title>
    <style>
        @font-face {
            font-family: 'Cinecaption';
            src: url('https://dl.dropboxusercontent.com/scl/fi/gbyay8c3as3f0l2e2q2un/cinecaption_2.28.woff2?rlkey=pgaofit9g6699gsww2m3p9l7b&raw=1') format('woff2');
            font-display: swap;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Cinecaption', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 5px; overflow-y: auto; }
        .main-container { width: 100%; max-width: 420px; margin: 10px 0; }
        .player-panel { background-color: silver; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .canvas-container { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 30px; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .btn-img { width: 30px; cursor: pointer; }
        .side-panel { font-size: 0.75rem; }
    </style>
</head>
<body>
    <div id="renderOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;">
        <h2 style="color: #ff4488; margin-bottom: 10px;">MOVIE SAVING...</h2>
        <iframe id="miniGameIframe" src="mini-game.html" style="width: 90%; max-width: 400px; height: 50vh; border: none; background: #000;"></iframe>
    </div>

    <script>
        // ... (省略：前半のロジックは同じ) ...

        let isRendering = false;

        // ゲーム側から終了合図を受け取る仕組み
        window.addEventListener('message', (event) => {
            if (event.data === 'gameFinished' && isRendering) {
                finalizeRecording();
            }
        });

        let movieRecorder, movieChunks, bufferSource, renderAudioCtx;

        async function finalizeRecording() {
            if (movieRecorder && movieRecorder.state === "recording") {
                movieRecorder.stop();
                bufferSource.stop();
                renderAudioCtx.close();
            }
        }

        downloadBtn.addEventListener('click', async () => {
            if (!audioBlob) return;
            document.getElementById('renderOverlay').style.display = 'flex';
            document.getElementById('miniGameIframe').src = 'mini-game.html';
            isRendering = true;

            renderAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await audioBlob.arrayBuffer();
            const audioBuffer = await renderAudioCtx.decodeAudioData(arrayBuffer);
            bufferSource = renderAudioCtx.createBufferSource();
            bufferSource.buffer = audioBuffer;

            // (EQやGainの設定は前回同様)
            // ... [ここを前回のEQ/Gain設定コードで埋めてください] ...

            const captureCanvas = document.createElement('canvas'); captureCanvas.width = 600; captureCanvas.height = 600;
            const rCtx = captureCanvas.getContext('2d');
            const stream = captureCanvas.captureStream(30);
            const renderDest = renderAudioCtx.createMediaStreamDestination();
            rGain.connect(renderDest);

            const combinedStream = new MediaStream([...stream.getVideoTracks(), ...renderDest.stream.getAudioTracks()]);
            movieRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
            movieChunks = [];
            movieRecorder.ondataavailable = (e) => movieChunks.push(e.data);
            movieRecorder.onstop = () => {
                isRendering = false;
                const blob = new Blob(movieChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'movie.webm'; a.click();
                document.getElementById('renderOverlay').style.display = 'none';
                resetDataWithoutPrompt();
            };

            movieRecorder.start();
            bufferSource.start(0);

            function renderFrame() {
                if(!isRendering) return;
                rAnalyser.getByteFrequencyData(rDataArray);
                rCtx.fillRect(0,0,600,600);
                drawWaveLogic(rCtx, captureCanvas, rDataArray);
                requestAnimationFrame(renderFrame);
            }
            renderFrame();
        });
    </script>
</body>
</html>
