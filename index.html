<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声リズムゲーム（エフェクト＆ランダム版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #555;
            background-color: #050510;
            max-width: 100%;
            max-height: 70vh;
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #f0a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">【30秒限定】白丸が重なる瞬間に手拍子！リングの発光色に注目👏✨</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="360" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        // ゲームステート
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let timeLeft = 30;
        let timerInterval;

        // 発光エフェクト管理用変数
        let flashAlpha = 0;      // 発光の強さ（透明度）
        let flashColor = "#fff"; // 発光の色
        let flashBlur = 0;       // ぼかし（光の広がり）の強さ

        // ランダムリズム生成用タイマー
        let nextSpawnCountdown = 0;

        // ノーツ配列
        let notes = [];
        const noteSpeed = 4.5; // 落下速度
        
        // 判定ラインの位置
        const judgmentY = canvas.height - 80;
        const targetRadius = 30; 

        // チャタリング防止用
        let canInput = true;
        let inputCooldown = 0;

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                combo = 0;
                maxCombo = 0;
                timeLeft = 30;
                notes = [];
                flashAlpha = 0;
                nextSpawnCountdown = 30; // 最初のノーツが降るまでの時間（フレーム数）
                startBtn.style.display = 'none';

                // 30秒タイマー
                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;

            updateAudio();
            updateGame();
            drawGame();

            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let volume = total / dataArray.length;

            const threshold = 22; 

            if (inputCooldown > 0) {
                inputCooldown--;
                if (inputCooldown === 0) canInput = true;
            }

            if (volume > threshold && canInput) {
                checkJudgment(); 
                canInput = false;
                inputCooldown = 12; 
            }
        }

        function updateGame() {
            // 🎵 【修正】リズムを完全ランダムに自動生成
            nextSpawnCountdown--;
            if (nextSpawnCountdown <= 0) {
                notes.push({
                    x: canvas.width / 2,
                    y: -20,
                    radius: 18,
                    hit: false
                });
                
                // 次のノーツが降ってくるまでの間隔をランダムに決定（18〜70フレームの間＝約0.3秒〜1.1秒）
                nextSpawnCountdown = Math.floor(Math.random() * 52) + 18;
            }

            // ノーツの移動と画面外判定
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].y += noteSpeed;

                // 判定ラインを通り過ぎてしまった場合（MISS）
                if (notes[i].y > judgmentY + 45) {
                    notes.splice(i, 1);
                    combo = 0; // コンボがリセットされても文字は出さない
                }
            }

            // 発光エフェクトのフェードアウト処理（徐々に消えていく）
            if (flashAlpha > 0) {
                flashAlpha -= 0.05; 
                if (flashAlpha < 0) flashAlpha = 0;
            }
        }

        // 🎯 タイミング判定ロジック（文字を廃止し、光り方で評価）
        function checkJudgment() {
            if (notes.length === 0) return;

            let targetNote = notes[0];
            let distance = Math.abs(targetNote.y - judgmentY);

            // 🌟【修正】判定による発光エフェクトの切り替え
            if (distance < 16) {
                // Perfect/Great判定：ネオンのように激しくまばゆい「水色〜白」の強烈な光
                flashColor = "#00ffff";
                flashAlpha = 1.0;
                flashBlur = 25; // 強く光る
                score += 100 + combo * 5;
                combo++;
                notes.shift(); 
            } else if (distance < 45) {
                // Good判定：オレンジ〜黄色っぽく「ふわっと優しく」光る
                flashColor = "#ffaa00";
                flashAlpha = 0.7;
                flashBlur = 12; // 優しく光る
                score += 40;
                combo++;
                notes.shift();
            }
            
            if (combo > maxCombo) maxCombo = combo;
        }

        function drawGame() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // レーンの線
            ctx.strokeStyle = '#151530';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // ⭐【光のエフェクト描画】判定に成功した時だけリングの後ろに光をにじませる
            if (flashAlpha > 0) {
                ctx.save();
                ctx.shadowBlur = flashBlur;
                ctx.shadowColor = flashColor;
                ctx.strokeStyle = flashColor;
                ctx.lineWidth = 8;
                ctx.globalAlpha = flashAlpha;
                ctx.beginPath();
                ctx.arc(canvas.width / 2, judgmentY, targetRadius + 4, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            // 🎯 通常の判定リング
            ctx.strokeStyle = '#555577';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, judgmentY, targetRadius, 0, Math.PI * 2);
            ctx.stroke();

            // ⭐【修正】流れてくるノーツの描画（綺麗な白い光の球）
            notes.forEach(note => {
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff'; // 白く光らせる
                
                let gradient = ctx.createRadialGradient(note.x, note.y, 2, note.x, note.y, note.radius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.8, '#e0e0ff');
                gradient.addColorStop(1, '#aaaaaa');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.arc(note.x, note.y, note.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // UIテキスト（スコア・残り時間・コンボ）
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            
            ctx.textAlign = 'right';
            if (timeLeft <= 5) ctx.fillStyle = '#ff3333';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 40);

            ctx.fillStyle = '#fff';
            if (combo > 0) {
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'center';
                ctx.font = 'bold 22px sans-serif';
                ctx.fillStyle = '#00ffaa';
                ctx.fillText(`${combo} COMBO`, canvas.width / 2, canvas.height / 2 - 80);
            }

            // 🛑 リザルト画面
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('タイムアップ！', canvas.width / 2, canvas.height / 2 - 40);
                
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, canvas.width / 2, canvas.height / 2 + 10);

                ctx.fillStyle = '#00ffaa';
                ctx.font = '18px sans-serif';
                ctx.fillText(`最大コンボ: ${maxCombo}`, canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            
            setTimeout(() => {
                startBtn.textContent = 'もう一度挑戦する';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
