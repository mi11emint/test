<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声リズムゲーム（プロトタイプ）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #555;
            background-color: #050510;
            max-width: 100%;
            max-height: 70vh;
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #f0a;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">【リズムゲーム試作】リズムに合わせて声を出すか、手を叩こう！👏</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="360" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;

        // ゲームステート
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let ratingText = ""; // PERFECT, GREAT, MISS など
        let ratingColor = "#fff";
        let ratingTimer = 0;

        // リズム設定 (BPM: 120 = 1秒に2拍)
        const bpm = 120;
        const beatInterval = (60 / bpm) * 1000; // 1拍のミリ秒 (500ms)
        let lastSpawnTime = 0;

        // ノーツ配列
        let notes = [];
        const noteSpeed = 4; // 落下速度
        
        // 判定ラインの位置（画面下部）
        const judgmentY = canvas.height - 80;
        const targetRadius = 30; // 判定サークルの大きさ

        // マイク入力のチャタリング（連続判定）防止用
        let canInput = true;
        let inputCooldown = 0;

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                score = 0;
                combo = 0;
                maxCombo = 0;
                notes = [];
                ratingText = "";
                startBtn.style.display = 'none';
                lastSpawnTime = Date.now();

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;

            updateAudio();
            updateGame();
            drawGame();

            requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let volume = total / dataArray.length;

            // 音量しきい値（手を叩く、または大きめの声）
            const threshold = 25; 

            // クールダウン処理
            if (inputCooldown > 0) {
                inputCooldown--;
                if (inputCooldown === 0) canInput = true;
            }

            if (volume > threshold && canInput) {
                checkJudgment(); // タイミング判定へ
                canInput = false;
                inputCooldown = 12; // 一度反応したら12フレーム（約0.2秒）は再反応しない
            }
        }

        function updateGame() {
            const now = Date.now();

            // 🎵 一定のリズム（BPM）で上からノーツを降らせる
            if (now - lastSpawnTime >= beatInterval) {
                notes.push({
                    x: canvas.width / 2, // 中央の1レーン
                    y: -20,
                    radius: 20,
                    hit: false
                });
                lastSpawnTime = now;
            }

            // ノーツの移動と画面外判定
            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].y += noteSpeed;

                // 判定ラインを通り過ぎてしまった場合（MISS）
                if (notes[i].y > judgmentY + 50 && !notes[i].hit) {
                    notes.splice(i, 1);
                    ratingText = "MISS...";
                    ratingColor = "#ff3333";
                    ratingTimer = 30;
                    combo = 0; // コンボ途切れる
                }
            }

            // 文字表示タイマーの更新
            if (ratingTimer > 0) ratingTimer--;
        }

        // 🎯 タイミング判定ロジック
        function checkJudgment() {
            if (notes.length === 0) return;

            // 一番下にある（判定ラインに最も近い）ノーツを取得
            let targetNote = notes[0];
            
            // 判定ラインとノーツの距離を計算
            let distance = Math.abs(targetNote.y - judgmentY);

            // 距離に応じた評価
            if (distance < 15) {
                ratingText = "PERFECT!!!";
                ratingColor = "#ffcc00";
                score += 100 + combo * 5;
                combo++;
                notes.shift(); // 判定したノーツを消す
            } else if (distance < 35) {
                ratingText = "GREAT!";
                ratingColor = "#00ffaa";
                score += 50 + combo * 2;
                combo++;
                notes.shift();
            } else if (distance < 55) {
                ratingText = "GOOD";
                ratingColor = "#00aaff";
                score += 20;
                combo++;
                notes.shift();
            }
            // 遠すぎる場合は空振り（何もしない、またはMISSにしても良い）
            
            if (combo > maxCombo) maxCombo = combo;
            if (ratingText !== "") ratingTimer = 40;
        }

        function drawGame() {
            // 背景クリア
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // レーンの線
            ctx.strokeStyle = '#222244';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // 🎯 判定リング（ここに重なった瞬間に叩く！）
            ctx.strokeStyle = '#555577';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, judgmentY, targetRadius, 0, Math.PI * 2);
            ctx.stroke();

            // 内側にもう一本うっすらガイド線
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, judgmentY, targetRadius - 10, 0, Math.PI * 2);
            ctx.stroke();

            // 🎵 流れてくるノーツの描画
            notes.forEach(note => {
                // グラデーションで光る綺麗なノーツに
                let gradient = ctx.createRadialGradient(note.x, note.y, 2, note.x, note.y, note.radius);
                gradient.addColorStop(0, '#ff00aa');
                gradient.addColorStop(1, '#990055');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.arc(note.x, note.y, note.radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 輪郭
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // UIテキスト（スコア・コンボ）
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 20, 40);
            
            ctx.textAlign = 'right';
            ctx.fillText(`MAX COMBO: ${maxCombo}`, canvas.width - 20, 40);

            if (combo > 0) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 24px sans-serif';
                ctx.fillStyle = '#0fa';
                ctx.fillText(`${combo} COMBO`, canvas.width / 2, canvas.height / 2 - 50);
            }

            // 判定評価（PERFECT! など）の表示
            if (ratingTimer > 0) {
                ctx.textAlign = 'center';
                ctx.font = 'bold 28px sans-serif';
                ctx.fillStyle = ratingColor;
                ctx.fillText(ratingText, canvas.width / 2, canvas.height / 2);
            }
        }
    </script>
</body>
</html>
