<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音声インベーダー（ボス確実出現版）</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #555;
            background-color: #000;
            max-width: 100%;
            max-height: 60vh;
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #0fa;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #info {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .btn-move {
            width: 45%;
            height: 60px;
            font-size: 24px;
            font-weight: bold;
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-move:active {
            background-color: #555;
        }
    </style>
</head>
<body>

    <div id="info">【今度こそ降臨】後半15秒で巨大ボス出現！ビームでHPを削れ！🎤👑</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <div class="controls">
        <button id="leftBtn" class="btn-move">◀</button>
        <button id="rightBtn" class="btn-move">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let score = 0;
        let timeLeft = 30;
        let timerInterval;

        let bullets = [];
        let invaders = [];
        let boss = null; 

        let player = { x: canvas.width / 2, y: canvas.height - 40, speed: 9 };
        let moveLeft = false;
        let moveRight = false;

        let voiceDuration = 0;
        let isBeaming = false;
        let invaderSpawnTimer = 0;
        let hasBossSpawned = false; // ボス出現フラグ

        const setBtnEvent = (btn, startFlag, endFlag) => {
            btn.addEventListener('mousedown', () => { if(isPlaying) startFlag() });
            btn.addEventListener('mouseup', () => { endFlag() });
            btn.addEventListener('mouseleave', () => { endFlag() });
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); if(isPlaying) startFlag() });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); endFlag() });
        };

        setBtnEvent(leftBtn, () => moveLeft = true, () => moveLeft = false);
        setBtnEvent(rightBtn, () => moveRight = true, () => moveRight = false);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') moveLeft = true;
            if (e.key === 'ArrowRight') moveRight = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') moveLeft = false;
            if (e.key === 'ArrowRight') moveRight = false;
        });

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                timeLeft = 30;
                hasBossSpawned = false;
                bullets = [];
                invaders = [];
                boss = null;
                startBtn.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;

            updateAudio();
            updateGame();
            checkCollisions();
            drawGame();

            if (!isGameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let volume = total / dataArray.length;

            const threshold = 15;

            if (volume > threshold) {
                voiceDuration++;
                if (voiceDuration > 15) isBeaming = true;

                if (isBeaming) {
                    bullets.push({
                        x: player.x,
                        y: player.y - 10,
                        width: Math.min(volume * 0.6, 50),
                        height: 25,
                        speed: 15,
                        color: '#f0f',
                        isBeam: true
                    });
                } else {
                    if (voiceDuration % 3 === 1) {
                        bullets.push({
                            x: player.x,
                            y: player.y - 10,
                            radius: Math.min(volume * 0.4, 30),
                            speed: 9,
                            color: '#0fa',
                            isBeam: false
                        });
                    }
                }
            } else {
                voiceDuration = 0;
                isBeaming = false;
            }
        }

        function updateGame() {
            if (moveLeft) player.x -= player.speed;
            if (moveRight) player.x += player.speed;

            if (player.x < 20) player.x = 20;
            if (player.x > canvas.width - 20) player.x = canvas.width - 20;

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < -50) bullets.splice(i, 1);
            }

            // --- インベーダー＆ボス出現ロジック ---
            invaderSpawnTimer++;
            
            // 残り15秒以下なら、2フレームに1回という超高速で雑魚を湧かせる
            const spawnInterval = (timeLeft <= 15) ? 2 : 12;

            if (invaderSpawnTimer > spawnInterval) {
                invaders.push({
                    x: Math.random() * (canvas.width - 50) + 25,
                    y: -20,
                    size: 22,
                    speed: (timeLeft <= 15) ? (2.0 + Math.random() * 2.5) : (1.5 + Math.random() * 2.0)
                });
                invaderSpawnTimer = 0;
            }

            // ⭐【修正：ボス出現判定を強化】残り15秒以下で、まだ1回もボスが出ていなければ確実に生成
            if (timeLeft <= 15 && !hasBossSpawned) {
                boss = {
                    x: canvas.width / 2,
                    y: -50,
                    size: 80, // 圧倒的デカさ
                    speed: 0.6,
                    hp: 20, // 耐久力
                    maxHp: 20
                };
                hasBossSpawned = true; // 出現済みにする
            }

            // ボスの移動
            if (boss) {
                boss.y += boss.speed;
                if (boss.y > canvas.height + 50) {
                    boss.y = -50; // 下まで行ったら上からループ
                }
            }

            // 雑魚インベーダーの移動
            for (let i = invaders.length - 1; i >= 0; i--) {
                invaders[i].y += invaders[i].speed;
                if (invaders[i].y > canvas.height + 20) {
                    invaders.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let b = bullets.length - 1; b >= 0; b--) {
                let bullet = bullets[b];
                if (!bullet) continue;

                // ボスとの当たり判定
                if (boss) {
                    let hitBoss = false;
                    let dx = bullet.x - boss.x;
                    let dy = bullet.y - boss.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // ボスの丸い体に当たったかの判定
                    if (distance < (bullet.radius || bullet.width/2) + boss.size/3) {
                        hitBoss = true;
                    }

                    if (hitBoss) {
                        boss.hp--; 
                        score += 10; 

                        if (boss.hp <= 0) {
                            boss = null; // ボス撃破！
                            score += 5000; // 超ボーナス
                        }

                        if (!bullet.isBeam) {
                            bullets.splice(b, 1);
                            continue;
                        }
                    }
                }

                // 雑魚インベーダーとの当たり判定
                for (let i = invaders.length - 1; i >= 0; i--) {
                    let invader = invaders[i];
                    if (!bullet || !invader) continue;

                    let hit = false;
                    if (bullet.isBeam) {
                        let closeX = Math.max(bullet.x - bullet.width/2, Math.min(invader.x, bullet.x + bullet.width/2));
                        let closeY = Math.max(bullet.y, Math.min(invader.y, bullet.y + bullet.height));
                        let distanceX = invader.x - closeX;
                        let distanceY = invader.y - closeY;
                        if ((distanceX * distanceX + distanceY * distanceY) < (invader.size * invader.size)) hit = true;
                    } else {
                        let dx = bullet.x - invader.x;
                        let dy = bullet.y - invader.y;
                        if (Math.sqrt(dx * dx + dy * dy) < (bullet.radius + invader.size)) hit = true;
                    }

                    if (hit) {
                        invaders.splice(i, 1);
                        score += 100;
                        if (!bullet.isBeam) {
                            bullets.splice(b, 1);
                            break;
                        }
                    }
                }
            }
        }

        function drawGame() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 自機
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 20, player.y, 40, 15);
            ctx.fillRect(player.x - 5, player.y - 8, 10, 8);

            // 弾
            bullets.forEach(bullet => {
                ctx.fillStyle = bullet.color;
                if (!bullet.isBeam) {
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(bullet.x - bullet.width / 2, bullet.y, bullet.width, bullet.height);
                }
            });

            // ボスの描画
            if (boss) {
                ctx.font = `${boss.size}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👑👾', boss.x, boss.y); 

                // ボスのHPバー
                let barWidth = 70;
                let barHeight = 8;
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(boss.x - barWidth/2, boss.y - boss.size/2, barWidth, barHeight);
                ctx.fillStyle = '#0fa';
                ctx.fillRect(boss.x - barWidth/2, boss.y - boss.size/2, barWidth * (boss.hp / boss.maxHp), barHeight);
            }

            // 雑魚インベーダー
            invaders.forEach(invader => {
                ctx.font = `${invader.size * 1.3}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('👾', invader.x, invader.y);
            });

            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 15, 30);
            
            if (timeLeft <= 15) {
                ctx.fillStyle = '#ff3333';
                ctx.font = 'bold 18px sans-serif';
            }
            ctx.textAlign = 'right';
            ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 15, 30);

            // リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('ゲーム終了！', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.fillStyle = '#0fa';
                ctx.font = '22px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            
            setTimeout(() => {
                startBtn.textContent = 'もう一度遊ぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
