<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界樹の開花 - Healing Tree</title>
    <style>
        body {
            margin: 0;
            background-color: #04040a;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #020205;
            max-width: 100%;
            max-height: 70vh;
            border-radius: 8px;
        }
        #startBtn {
            padding: 16px 32px;
            font-size: 18px;
            background-color: #e1bee7;
            color: #212121;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(225, 190, 231, 0.4);
            z-index: 100;
        }
        #info {
            font-size: 14px;
            color: #90a4ae;
            margin-bottom: 12px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div id="info">穏やかな語りかけや音楽で、大樹の中央に宝石を咲かせましょう</div>
    <button id="startBtn" onclick="startGame()">世界樹の声を聴く</button>
    <canvas id="gameCanvas" width="500" height="500" style="display:none;"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        // 🌳 設定いただいた大樹のURL
        const TREE_IMAGE_URL = 'https://img1.mitemin.net/g3/mj/2txw8fapepkqd1o8fs86c53z4c_9vl_18g_18g_3cih.png'; 
        const treeImg = new Image();
        treeImg.crossOrigin = "anonymous";
        treeImg.src = TREE_IMAGE_URL;

        let audioContext, analyser, dataArray, audioStream;
        let isPlaying = false, isGameOver = false;
        let timeLeft = 30, timerInterval, bloomProgress = 0, flowers = [];

        async function startGame() {
            if (isPlaying) return;
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(audioStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                // ⭐ UIの切り替え（ボタンを隠してキャンバスを出す）
                startBtn.style.display = 'none';
                canvas.style.display = 'block';

                isPlaying = true;
                isGameOver = false;
                timeLeft = 30;
                bloomProgress = 0;
                
                // ⭐【花の配置】画像の「中心」から円状に広がるように生成
                flowers = [];
                const totalFlowers = 300; 
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2 - 20; // 木の重心付近

                for(let i = 0; i < totalFlowers; i++) {
                    // 360度（全方位）にランダム配置
                    let angle = Math.random() * Math.PI * 2;
                    // 中央に密集しつつ、外側にも広がる計算
                    let dist = Math.pow(Math.random(), 0.7) * 160; 
                    
                    let fx = centerX + Math.cos(angle) * dist;
                    let fy = centerY + Math.sin(angle) * dist;

                    const pastelColors = ["#ffb7d5", "#b2ebf2", "#fff59d", "#c8e6c9", "#e1bee7", "#ffcc80"];
                    // 0%から100%まで均等にバラけさせる
                    let required = 0.01 + Math.random() * 0.98;

                    flowers.push({
                        x: fx, y: fy,
                        color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
                        maxSize: Math.random() * 3.5 + 2.5,
                        requiredProgress: required,
                        sparkleOffset: Math.random() * 100
                    });
                }

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクを許可してください');
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let total = 0;
            for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
            let avg = total / dataArray.length;

            if (avg > 15) {
                // 進行スピード（約20秒で満開）
                bloomProgress += 0.00085; 
                if (bloomProgress > 1.1) bloomProgress = 1.1; 
            }
        }

        function drawGame() {
            ctx.fillStyle = '#030308';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 画像の描画（不必要な幹の棒は削除済み）
            ctx.save();
            if (treeImg.complete) {
                ctx.globalAlpha = 0.5; // 背景に馴染ませる
                // 画像を中央に配置
                ctx.drawImage(treeImg, 50, 60, 400, 400);
            }
            ctx.restore();

            // 2. 花の描画
            let now = Date.now();
            flowers.forEach(f => {
                if (bloomProgress >= f.requiredProgress) {
                    ctx.save();
                    let sparkle = Math.sin((now / 200) + f.sparkleOffset) * 0.25 + 0.75;
                    ctx.globalAlpha = sparkle;
                    
                    // 開花具合でサイズを計算（14%で満開にならないよう調整）
                    let timeSinceBloom = bloomProgress - f.requiredProgress;
                    let sizeGrowth = Math.min(1.0, timeSinceBloom * 4 + 0.15); 
                    let currentSize = f.maxSize * sizeGrowth;

                    ctx.shadowBlur = currentSize * 2.0;
                    ctx.shadowColor = f.color;
                    ctx.fillStyle = f.color;
                    ctx.beginPath(); ctx.arc(f.x, f.y, currentSize, 0, Math.PI * 2); ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(f.x, f.y, currentSize * 0.35, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            });

            // UI
            let displayPercent = Math.min(100, Math.floor(bloomProgress * 100));
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '15px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(`世界樹の開花度: ${displayPercent}%`, 25, 40);
            ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 25, 40);

            if (isGameOver) {
                ctx.fillStyle = 'rgba(2, 2, 6, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '22px sans-serif';
                ctx.fillText('時の砂が尽きました', 250, 220);
                ctx.fillStyle = '#e1bee7'; ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終開花度: ${displayPercent}%`, 250, 270);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度育てる';
                startBtn.style.display = 'block';
                // canvasを隠す設定はリトライ時に不都合なので、ここでは残します
            }, 2500);
        }
    </script>
</body>
</html>
