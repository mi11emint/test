<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D音声リズムゲーム（低音感度UP＆白ゲージ版）</title>
    <style>
        body {
            margin: 0;
            background-color: #03030a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 2px solid #223;
            background-color: #010105;
            max-width: 100%;
            max-height: 70vh;
            box-shadow: 0 0 25px rgba(0,255,255,0.08);
        }
        #startBtn {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 15px #00ffff;
        }
        #info {
            font-size: 14px;
            color: #778;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="info">【低音感度強化】サークルゲージが白に進化！低音もサクサク反応します👏</div>
    <button id="startBtn">ゲームスタート</button>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let isPlaying = false;
        let isGameOver = false;

        let score = 0;
        let combo = 0;
        let timeLeft = 30;
        let timerInterval;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const judgeHighY = 70;
        const judgeLowY = canvas.height - 70;
        const targetRadius = 32;

        let notes = [];
        let nextSpawnCountdown = 0;
        let hitEffects = [];
        let fireworks = [];

        let canInput = true;
        let inputCooldown = 0;

        startBtn.addEventListener('click', async () => {
            if (isPlaying) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512; 
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                isPlaying = true;
                isGameOver = false;
                score = 0;
                combo = 0;
                timeLeft = 30;
                notes = [];
                hitEffects = [];
                fireworks = [];
                nextSpawnCountdown = 20;
                startBtn.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) endGame();
                }, 1000);

                gameLoop();
            } catch (err) {
                alert('マイクの許可が必要です：' + err);
            }
        });

        function gameLoop() {
            if (!isPlaying) return;
            updateAudio();
            updateGame();
            drawGame();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function updateAudio() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            
            let totalHigh = 0;
            let totalLow = 0;
            let maxVal = 0;
            let maxIndex = 0;

            const hzPerBucket = audioContext.sampleRate / analyser.fftSize;

            for (let i = 0; i < dataArray.length; i++) {
                let val = dataArray[i];
                let currentHz = i * hzPerBucket;

                // ⭐【修正】スマホマイクが拾いにくい低音（444Hz未満）の数値を内部で1.5倍にブースト！
                if (currentHz < 444) {
                    val = val * 1.5;
                    if (val > 255) val = 255; // 上限打ち止め
                }

                if (val > maxVal) {
                    maxVal = val;
                    maxIndex = i; 
                }
            }

            // 全体の平均音量を計算（ここもブースト後の値で計算されるため感度が上がります）
            let volume = maxVal; // 瞬間的な最大音量を取り入れることで手拍子のキレに合わせる
            
            // ⭐【修正】全体の反応しきい値を「18」から「14」に下げて小さな手拍子も検知
            const threshold = 14; 

            if (inputCooldown > 0) {
                inputCooldown--;
                if (inputCooldown === 0) canInput = true;
            }

            if (volume > threshold && canInput) {
                const peakHz = maxIndex * hzPerBucket;
                
                // 444Hz以上を高音、未満を低音
                let isHighPitch = peakHz >= 444;

                checkJudgment(isHighPitch); 
                canInput = false;
                inputCooldown = 9; 
            }
        }

        function updateGame() {
            nextSpawnCountdown--;
            if (nextSpawnCountdown <= 0) {
                let type = Math.random() > 0.5 ? "high" : "low";
                notes.push({
                    type: type,
                    progress: 0, 
                    speed: 0.016 + Math.random() * 0.008
                });
                nextSpawnCountdown = Math.floor(Math.random() * 35) + 20;
            }

            for (let i = notes.length - 1; i >= 0; i--) {
                notes[i].progress += notes[i].speed;
                if (notes[i].progress > 1.15) {
                    notes.splice(i, 1);
                    combo = 0; 
                }
            }

            for (let i = hitEffects.length - 1; i >= 0; i--) {
                hitEffects[i].alpha -= 0.06;
                hitEffects[i].radius += 2.5;
                if (hitEffects[i].alpha <= 0) hitEffects.splice(i, 1);
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                let fw = fireworks[i];
                fw.delay--;
                if (fw.delay <= 0) {
                    fw.state = "explode";
                    fw.alpha -= 0.02; 
                    fw.radius += fw.expandSpeed; 
                    fw.expandSpeed *= 0.96; 
                }
                if (fw.alpha <= 0) fireworks.splice(i, 1);
            }
        }

        function checkJudgment(isHighInput) {
            let targetType = isHighInput ? "high" : "low";
            let targetIndex = -1;
            let maxProgress = -1;

            for(let i=0; i<notes.length; i++) {
                if(notes[i].type === targetType && notes[i].progress > maxProgress) {
                    maxProgress = notes[i].progress;
                    targetIndex = i;
                }
            }

            if (targetIndex === -1) return; 
            
            let note = notes[targetIndex];
            let diff = Math.abs(note.progress - 1.0);
            let currentY = note.type === "high" ? centerY - (centerY - judgeHighY) * note.progress : centerY + (judgeLowY - centerY) * note.progress;

            let hitSuccess = false;

            if (diff < 0.08) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#ffffff", blur: 40, alpha: 1.0
                });
                score += 150;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            } else if (diff < 0.18) {
                hitEffects.push({
                    x: centerX, y: currentY, radius: targetRadius,
                    color: "#88ccff", blur: 18, alpha: 0.75
                });
                score += 50;
                combo++;
                hitSuccess = true;
                notes.splice(targetIndex, 1);
            }

            if (hitSuccess && combo >= 10) {
                triggerFireworkShow(); 
                combo = 0; 
            }
        }

        function triggerFireworkShow() {
            const colors = ["#ff00ff", "#00ffff", "#ffff00", "#ff3366", "#33ff66"];
            for (let i = 0; i < 5; i++) {
                fireworks.push({
                    x: Math.random() * (canvas.width - 100) + 50,
                    y: Math.random() * (canvas.height - 150) + 50,
                    radius: 5,
                    maxRadius: Math.random() * 40 + 40,
                    expandSpeed: 3 + Math.random() * 2,
                    color: colors[i % colors.length],
                    alpha: 1.0,
                    delay: i * 12, 
                    state: "wait"
                });
            }
            score += 1000; 
        }

        function drawGame() {
            ctx.fillStyle = '#020206';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 背景花火
            fireworks.forEach(fw => {
                if (fw.state === "explode") {
                    ctx.save();
                    ctx.globalAlpha = fw.alpha;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = fw.color;
                    ctx.strokeStyle = fw.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius, 0, Math.PI * 2); ctx.stroke();
                    ctx.fillStyle = "#fff";
                    ctx.beginPath(); ctx.arc(fw.x, fw.y, fw.radius * 0.15, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            });

            // レーン線
            ctx.strokeStyle = '#101025';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, judgeHighY);
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX, judgeLowY);
            ctx.stroke();

            // 🎯 判定リング
            ctx.strokeStyle = 'rgba(255, 0, 150, 0.35)';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(centerX, judgeHighY, targetRadius, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = 'rgba(0, 150, 255, 0.35)';
            ctx.beginPath(); ctx.arc(centerX, judgeLowY, targetRadius, 0, Math.PI * 2); ctx.stroke();

            // 発光残像
            hitEffects.forEach(fx => {
                ctx.save();
                ctx.globalAlpha = fx.alpha;
                ctx.shadowBlur = fx.blur;
                ctx.shadowColor = fx.color;
                ctx.fillStyle = fx.color;
                ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.radius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // 🎵 白い光ノーツ
            notes.forEach(note => {
                let currentY = note.type === "high" ? centerY - (centerY - judgeHighY) * note.progress : centerY + (judgeLowY - centerY) * note.progress;
                let currentRadius = 2 + (16 * note.progress);

                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = note.type === "high" ? "#ff0066" : "#0099ff";
                
                let gradient = ctx.createRadialGradient(centerX, currentY, 1, centerX, currentY, currentRadius);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.7, '#f5f8ff');
                gradient.addColorStop(1, note.type === "high" ? "#ff0066" : "#0088ff");
                ctx.fillStyle = gradient;

                ctx.beginPath(); ctx.arc(centerX, currentY, currentRadius, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // ⭐【修正】中央コンボゲージ（ネオンに光るスタイリッシュな白色）
            ctx.save();
            ctx.strokeStyle = "#151525";
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 22, 0, Math.PI * 2);
            ctx.stroke();

            if (combo > 0) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ffffff"; // 白色の発光
                ctx.strokeStyle = "#ffffff"; // 白色のゲージ
                ctx.lineWidth = 6;
                let progressAngle = (combo / 10) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, 22, -Math.PI / 2, (-Math.PI / 2) + progressAngle);
                ctx.stroke();
            }
            ctx.restore();

            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '16px sans-serif';
            ctx.textAlign = 'left'; ctx.fillText(`SCORE: ${score}`, 20, 40);
            ctx.textAlign = 'right'; ctx.fillText(`TIME: ${timeLeft}s`, canvas.width - 20, 40);

            // 🛑 リザルト
            if (isGameOver) {
                ctx.fillStyle = 'rgba(1, 1, 5, 0.93)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.font = '24px sans-serif';
                ctx.fillText('タイムアップ！', centerX, centerY - 30);
                ctx.fillStyle = '#00ffff';
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText(`最終スコア: ${score}`, centerX, centerY + 20);
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(timerInterval);
            drawGame();
            setTimeout(() => {
                startBtn.textContent = 'もう一度遊ぶ';
                startBtn.style.display = 'block';
                isPlaying = false;
            }, 2000);
        }
    </script>
</body>
</html>
